<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Orbit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0e0e10;--bg1:#141416;--bg2:#1a1a1e;--bg3:#222228;--bg4:#2a2a32;
  --b0:rgba(255,255,255,0.06);--b1:rgba(255,255,255,0.11);--b2:rgba(255,255,255,0.18);
  --t0:#f0f0f2;--t1:#a0a0b8;--t2:#5a5a78;--t3:#2e2e44;
  --ac:#3ecf8e;--acd:rgba(62,207,142,0.12);--acb:rgba(62,207,142,0.28);
  --am:#f59e0b;--amd:rgba(245,158,11,0.1);--amb:rgba(245,158,11,0.25);
  --re:#ef4444;--red:rgba(239,68,68,0.1);
  --bl:#60a5fa;--bld:rgba(96,165,250,0.1);--blb:rgba(96,165,250,0.22);
  --pu:#a78bfa;--pud:rgba(167,139,250,0.1);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  --mono:"SF Mono","Fira Code","Cascadia Code",Consolas,monospace;
  --rsm:5px;--rmd:8px;--rlg:12px;--rxl:16px;
}
html,body,#root{height:100%}
body{font-family:var(--sans);background:var(--bg0);color:var(--t0);overflow:hidden;font-size:13px;-webkit-font-smoothing:antialiased;transition:background .18s,color .18s}
body[data-theme='light']{
  --bg0:#efe7da;--bg1:#fbf7ef;--bg2:#f5eee2;--bg3:#eadfce;--bg4:#ddd0bb;
  --b0:rgba(70,52,31,0.08);--b1:rgba(70,52,31,0.14);--b2:rgba(70,52,31,0.24);
  --t0:#241d14;--t1:#5d5347;--t2:#8c7d6d;--t3:#b8aa98;
  --ac:#169b62;--acd:rgba(22,155,98,0.12);--acb:rgba(22,155,98,0.24);
  --am:#c67a00;--amd:rgba(198,122,0,0.12);--amb:rgba(198,122,0,0.22);
  --re:#d14d3b;--red:rgba(209,77,59,0.1);
  --bl:#2563eb;--bld:rgba(37,99,235,0.1);--blb:rgba(37,99,235,0.22);
  --pu:#7c3aed;--pud:rgba(124,58,237,0.1);
}
body.is-resizing,body.is-resizing *{cursor:col-resize!important;user-select:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
.app{display:flex;height:100vh;position:relative}
.pane-resizer{width:12px;flex-shrink:0;cursor:col-resize;position:relative;background:transparent;touch-action:none}
.pane-resizer::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:var(--b0)}
.pane-resizer::after{content:'';position:absolute;left:3px;top:50%;transform:translateY(-50%);width:5px;height:56px;border-radius:999px;background:linear-gradient(180deg,transparent,var(--b1),transparent);opacity:.65;transition:opacity .12s,background .12s}
.pane-resizer:hover::after,.pane-resizer.on::after{opacity:1;background:linear-gradient(180deg,transparent,var(--acb),transparent)}

/* ── SIDEBAR ── */
.sb{width:200px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--b0);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:13px 12px 10px;border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:8px}
.logo-mark{width:22px;height:22px;border-radius:6px;background:var(--ac);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-size:14px;font-weight:700;letter-spacing:-.4px}

/* search */
.sb-search{padding:8px 8px 6px}
.search-wrap{position:relative}
.search-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--t2);pointer-events:none}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--b0);border-radius:var(--rmd);padding:5px 8px 5px 26px;font-size:11px;color:var(--t0);outline:none;font-family:var(--sans);transition:border-color .15s}
.search-inp:focus{border-color:var(--acb)}
.search-inp::placeholder{color:var(--t3)}
.search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t2);font-size:12px;padding:0;line-height:1}
.search-clear:hover{color:var(--t1)}

.sb-sec{padding:4px 6px 2px}
.sb-lbl{font-size:10px;font-weight:600;color:var(--t2);padding:4px 7px 2px;letter-spacing:.6px;text-transform:uppercase}
.date-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--rmd);cursor:pointer;font-size:12px;color:var(--t1);transition:background .1s,color .1s;position:relative}
.date-row:hover{background:var(--bg3);color:var(--t0)}
.date-row.on{background:var(--bg3);color:var(--t0)}
.date-row.dim{opacity:.45}
.ddot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dprog{margin-left:auto;font-size:10px;color:var(--t2)}

/* search results in sidebar */
.search-results{flex:1;overflow-y:auto;padding:4px 6px}
.sr-item{padding:6px 8px;border-radius:var(--rmd);cursor:pointer;transition:background .1s}
.sr-item:hover{background:var(--bg3)}
.sr-date{font-size:10px;color:var(--t2);margin-bottom:2px}
.sr-title{font-size:12px;color:var(--t0);font-weight:500;line-height:1.4}
.sr-match{font-size:10px;color:var(--t1);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-empty{padding:16px 10px;text-align:center;font-size:11px;color:var(--t2)}

.sb-bot{margin-top:auto;padding:8px;border-top:1px solid var(--b0)}
.wspath{font-family:var(--mono);font-size:10px;color:var(--t2);padding:4px 6px;background:var(--bg2);border-radius:var(--rsm);display:flex;align-items:flex-start;gap:5px;line-height:1.5;word-break:break-all}

/* ── MAIN COL ── */
.mc{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mc-hdr{padding:10px 14px;border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:10px;background:var(--bg1);flex-shrink:0}
.mc-date{font-size:14px;font-weight:700;letter-spacing:-.3px}
.mc-meta{font-size:11px;color:var(--t2);margin-left:auto}
.mc-meta em{color:var(--ac);font-style:normal;font-weight:600}
.hbtn{padding:5px 11px;font-size:11px;font-weight:600;border:1px solid var(--b1);border-radius:var(--rmd);cursor:pointer;background:transparent;color:var(--t1);transition:background .1s,color .1s;font-family:var(--sans)}
.hbtn:hover{background:var(--bg3);color:var(--t0)}
.hbtn.pri{background:var(--ac);border-color:var(--ac);color:#0a0a0c}
.hbtn.pri:hover{background:#4de09e}
.hbtn.ghost{min-width:82px}
.tl{flex:1;overflow-y:auto;padding:9px}

/* ── TODO CARD ── */
.tc{background:var(--bg2);border:1px solid var(--b0);border-radius:var(--rlg);margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.tc:hover{border-color:var(--b1)}
.tc.sel{border-color:var(--acb)}
.tc.done-c{opacity:.5}
.tc-row{display:flex;align-items:flex-start;gap:9px;padding:10px 11px;cursor:pointer}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--b1);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .1s,border-color .1s}
.chk:hover{border-color:var(--ac)}
.chk.ck{background:var(--ac);border-color:var(--ac)}
.chk.ck::after{content:'';display:block;width:8px;height:5px;border-left:1.5px solid #0a0a0c;border-bottom:1.5px solid #0a0a0c;transform:rotate(-45deg) translateY(-1px)}
.chk.part{background:var(--acd);border-color:var(--acb)}
.chk.part::after{content:'';display:block;width:7px;height:1.5px;background:var(--ac)}
.tbody{flex:1;min-width:0}
.ttl{font-size:13px;font-weight:600;color:var(--t0);line-height:1.4}
.ttl.dn{text-decoration:line-through;color:var(--t2)}
.tnp{font-size:11px;color:var(--t2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:360px}
.chips{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:flex;align-items:center;gap:4px}
.c-run{background:var(--acd);color:var(--ac);border:1px solid var(--acb)}
.c-fin{background:var(--bg3);color:var(--t2);border:1px solid var(--b0)}
.c-sub{background:var(--bg3);color:var(--t2);border:1px solid var(--b0)}
.c-noa{background:var(--amd);color:var(--am);border:1px solid var(--amb)}
.tacts{display:flex;align-items:center;gap:2px;flex-shrink:0}
.ibtn{width:26px;height:26px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:12px;border:none;background:transparent;transition:background .1s,color .1s}
.ibtn:hover{background:var(--bg4);color:var(--t1)}
.ibtn.del:hover{background:var(--red);color:var(--re)}
.subp{border-top:1px solid var(--b0);background:var(--bg1)}
.subi{padding:5px 11px 7px 37px}
.subr{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--b0)}
.subr:last-child{border-bottom:none}
.sch{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--b1);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sch.ck{background:var(--ac);border-color:var(--ac)}
.sch.ck::after{content:'';display:block;width:6px;height:4px;border-left:1.5px solid #0a0a0c;border-bottom:1.5px solid #0a0a0c;transform:rotate(-45deg) translateY(-1px)}
.stl{font-size:12px;color:var(--t1);flex:1}
.stl.dn{text-decoration:line-through;color:var(--t2)}
.spulse{width:5px;height:5px;border-radius:50%;background:var(--ac);flex-shrink:0}
.add-sub{display:flex;align-items:center;gap:5px;padding:5px 0;cursor:pointer;color:var(--t2);font-size:11px}
.add-sub:hover{color:var(--t1)}
.nsplit{border-top:1px solid var(--b0);display:flex}
.nsplit-edit{flex:1;padding:9px 11px 11px 37px;background:var(--bg0);border-right:1px solid var(--b0)}
.nsplit-prev{flex:1;padding:9px 11px 11px 11px;background:var(--bg1);overflow-y:auto;max-height:200px}
.nsplit-label{font-size:10px;color:var(--t2);margin-bottom:5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.med{width:100%;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:11px;color:var(--t1);resize:none;line-height:1.7;min-height:80px}
.md p{margin:2px 0;font-size:12px;color:var(--t1);line-height:1.7}
.md strong{color:var(--t0);font-weight:600}
.md code{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:4px;color:var(--ac)}
.md blockquote{border-left:2px solid var(--acb);padding-left:9px;color:var(--t2);margin:3px 0;font-size:12px}
.md h3,.md h4,.md h5{font-size:12px;font-weight:700;color:var(--t0);margin:7px 0 2px}
.md li{margin-left:14px;margin-bottom:2px;font-size:12px;color:var(--t1);line-height:1.6}
.md .tki{display:flex;align-items:flex-start;gap:6px;margin:2px 0}
.md .tkc{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--b1);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--t2);margin-top:2px}
.md .tki.ck .tkc{background:var(--ac);color:#0a0a0c;border-color:var(--ac)}
.md .tki span:last-child{font-size:12px;color:var(--t1);line-height:1.5}
.md .tki.ck span:last-child{text-decoration:line-through;color:var(--t2)}
.iedit{width:100%;background:transparent;border:none;outline:none;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--t0)}
.iedit::placeholder{color:var(--t3)}
.add-t{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:var(--rlg);border:1px dashed var(--b1);cursor:pointer;color:var(--t2);font-size:12px;transition:background .1s;margin-top:3px}
.add-t:hover{background:var(--bg2);color:var(--t1)}
.new-ti{background:var(--bg2);border:1px solid var(--acb);border-radius:var(--rlg);padding:10px 11px;margin-top:3px;display:flex;align-items:center;gap:9px}
.del-conf{padding:12px;background:var(--red);border-top:1px solid rgba(239,68,68,.2)}
.del-conf p{font-size:12px;color:var(--t1);margin-bottom:9px;line-height:1.5}

/* ── AGENT PANEL ── */
.ap{width:340px;flex-shrink:0;background:var(--bg1);border-left:1px solid var(--b0);display:flex;flex-direction:column;overflow:hidden}
.ap-hdr{padding:9px 12px;border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:7px;flex-shrink:0}
.ap-for{font-size:10px;color:var(--t2)}
.ap-ttl{font-size:12px;font-weight:600;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.at-wrap{display:flex;padding:6px 7px 0;gap:2px;border-bottom:1px solid var(--b0);flex-shrink:0;overflow-x:auto}
.at-wrap::-webkit-scrollbar{height:0}
.atab{font-size:11px;font-weight:600;padding:5px 9px 6px;border-radius:var(--rsm) var(--rsm) 0 0;cursor:pointer;color:var(--t2);border:1px solid transparent;border-bottom:none;display:flex;align-items:center;gap:5px;transition:color .1s,background .1s;white-space:nowrap;flex-shrink:0}
.atab:hover{color:var(--t1);background:var(--bg2)}
.atab.on{color:var(--t0);background:var(--bg0);border-color:var(--b0);margin-bottom:-1px;border-bottom:1px solid var(--bg0)}
.atab .td{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.atab-add{font-size:15px;padding:4px 7px 5px;color:var(--t2);cursor:pointer;border-radius:var(--rsm) var(--rsm) 0 0;border:1px solid transparent;border-bottom:none;display:flex;align-items:center;transition:color .1s;flex-shrink:0}
.atab-add:hover{color:var(--ac)}

/* agent status bar */
.a-sbar{padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sdot.running{background:var(--ac);animation:glow 2s ease-in-out infinite}
.sdot.finished{background:var(--t3)}
.sdot.paused{background:var(--am)}
.sdot.error{background:var(--re)}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--ac)}50%{box-shadow:0 0 10px var(--ac)}}
.sname{font-size:11px;color:var(--t1);font-weight:600}
.smodel{font-size:10px;color:var(--t2);font-family:var(--mono)}
.astat{font-size:10px;color:var(--t2);margin-left:auto}

/* ctx + workspace */
.ctx-s{padding:5px 12px;background:var(--bg2);border-bottom:1px solid var(--b0);flex-shrink:0}
.ctx-r{display:flex;align-items:center;gap:7px}
.ctx-l{font-size:10px;color:var(--t2);flex-shrink:0}
.ctx-b{flex:1;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.ctx-f{height:100%;border-radius:2px;transition:width .6s}
.ctx-p{font-size:10px;font-family:var(--mono);color:var(--t1);flex-shrink:0;min-width:28px;text-align:right}
.ws-info{padding:5px 12px;border-bottom:1px solid var(--b0);flex-shrink:0;display:flex;align-items:center;gap:6px}
.ws-lbl{font-size:10px;color:var(--t2)}
.ws-path{font-family:var(--mono);font-size:10px;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-badge{font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;background:var(--acd);color:var(--ac);border:1px solid var(--acb);flex-shrink:0}

/* ── CHAT THREAD ── */
.chat-thread{flex:1;overflow-y:auto;padding:10px 10px 6px;display:flex;flex-direction:column;gap:6px}

/* tool call block (merged) */
.tool-block{background:var(--bg0);border:1px solid var(--b0);border-radius:var(--rlg);overflow:hidden}
.tool-block-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .1s}
.tool-block-hdr:hover{background:var(--bg2)}
.tool-block-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.tbi-tool{background:var(--bld);color:var(--bl)}
.tbi-write{background:var(--acd);color:var(--ac)}
.tbi-read{background:var(--bg3);color:var(--t2)}
.tbi-list{background:var(--pud);color:var(--pu)}
.tool-block-name{font-size:11px;font-weight:600;color:var(--t0);font-family:var(--mono);flex:1}
.tool-block-arg{font-size:10px;color:var(--t2);font-family:var(--mono);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-block-status{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;flex-shrink:0}
.tbs-ok{background:var(--acd);color:var(--ac)}
.tbs-err{background:var(--red);color:var(--re)}
.tbs-run{background:var(--amd);color:var(--am)}
.tool-chevron{color:var(--t2);font-size:10px;flex-shrink:0}
.tool-block-body{border-top:1px solid var(--b0);background:var(--bg0)}
.tool-section{padding:6px 10px}
.tool-section-lbl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.tool-section pre{font-family:var(--mono);font-size:10px;color:var(--t2);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.tool-divider{height:1px;background:var(--b0);margin:0 10px}
.tool-result-ok{font-size:11px;color:var(--t1);font-family:var(--mono);padding:6px 10px;line-height:1.5}
.tool-result-err{font-size:11px;color:var(--re);font-family:var(--mono);padding:6px 10px}

/* think block — collapsible */
.think-block{background:var(--bg0);border:1px solid var(--amb);border-radius:var(--rlg);overflow:hidden}
.think-hdr{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;transition:background .1s}
.think-hdr:hover{background:var(--bg2)}
.think-icon{width:20px;height:20px;border-radius:5px;background:var(--amd);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--am)}
.think-label{font-size:11px;font-weight:600;color:var(--am);flex:1}
.think-preview{font-size:10px;color:var(--t2);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.think-chevron{font-size:10px;color:var(--t2);flex-shrink:0}
.think-body{border-top:1px solid var(--amb);padding:8px 10px 10px}
.think-txt{font-size:11px;color:var(--t2);line-height:1.7;font-style:italic;white-space:pre-wrap;word-break:break-word}

/* out block */
.out-block{background:var(--acd);border:1px solid var(--acb);border-radius:var(--rlg);padding:8px 11px}
.out-txt{font-size:12px;color:var(--t0);line-height:1.6}

/* sys block */
.sys-block{display:flex;align-items:center;gap:6px}
.sys-line{flex:1;height:1px;background:var(--b0)}
.sys-txt{font-size:10px;color:var(--t3);white-space:nowrap;padding:0 6px}

/* user message bubble */
.user-msg{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.user-bubble{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rlg) var(--rlg) 3px var(--rlg);padding:8px 11px;max-width:85%}
.user-bubble-text{font-size:12px;color:var(--t0);line-height:1.6;word-break:break-word}
.user-bubble-img{margin-top:6px;border-radius:var(--rmd);overflow:hidden;max-width:220px;border:1px solid var(--b1)}
.user-bubble-img img{display:block;width:100%;height:auto;max-height:160px;object-fit:cover}
.user-bubble-file{margin-top:5px;display:flex;align-items:center;gap:6px;background:var(--bg2);border-radius:var(--rsm);padding:5px 8px;border:1px solid var(--b0)}
.user-file-icon{width:22px;height:22px;border-radius:4px;background:var(--bld);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--bl)}
.user-file-name{font-size:10px;color:var(--t1);font-family:var(--mono);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-file-size{font-size:10px;color:var(--t2)}
.user-ts{font-size:9px;color:var(--t3);padding-right:2px}

/* collapsed run summary */
.run-summary{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--bg2);border:1px solid var(--b0);border-radius:var(--rlg);cursor:pointer;transition:background .1s}
.run-summary:hover{background:var(--bg3)}
.run-sum-ico{width:18px;height:18px;border-radius:4px;background:var(--acd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.run-sum-label{font-size:11px;color:var(--t1);flex:1}
.run-sum-label em{color:var(--t0);font-style:normal;font-weight:600}
.run-sum-chevron{font-size:10px;color:var(--t2)}

/* ── COMPOSER ── */
.composer{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--b0)}
.composer-attachments{padding:6px 10px 0;display:flex;gap:5px;flex-wrap:wrap}
.att-preview{position:relative;width:48px;height:48px;border-radius:var(--rmd);overflow:hidden;border:1px solid var(--b1)}
.att-preview img{width:100%;height:100%;object-fit:cover}
.att-preview-file{width:48px;height:48px;border-radius:var(--rmd);background:var(--bld);border:1px solid var(--blb);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.att-preview-file span:first-child{font-size:9px;font-weight:700;color:var(--bl);text-transform:uppercase}
.att-preview-file span:last-child{font-size:8px;color:var(--t2);max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-remove{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.7);border:none;cursor:pointer;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;line-height:1}
.composer-row{display:flex;align-items:flex-end;gap:6px;padding:7px 10px}
.composer-inp{flex:1;background:var(--bg0);border:1px solid var(--b1);border-radius:var(--rlg);padding:7px 10px;font-size:12px;font-family:var(--sans);color:var(--t0);outline:none;resize:none;line-height:1.5;max-height:100px;min-height:34px}
.composer-inp:focus{border-color:var(--acb)}
.composer-inp::placeholder{color:var(--t3)}
.composer-inp:disabled{opacity:.4}
.attach-btn{width:30px;height:30px;border-radius:var(--rmd);background:transparent;border:1px solid var(--b1);cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s,color .1s}
.attach-btn:hover{background:var(--bg3);color:var(--t1)}
.send-btn{padding:7px 13px;background:var(--ac);border:none;border-radius:var(--rlg);cursor:pointer;font-size:11px;font-weight:700;color:#0a0a0c;font-family:var(--sans);flex-shrink:0;transition:opacity .1s}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.35;cursor:default}
.drop-hint{font-size:10px;color:var(--t2);text-align:center;padding:4px 0 6px;display:flex;align-items:center;justify-content:center;gap:4px}
.composer.drag-over{border-color:var(--acb);box-shadow:inset 0 0 0 2px var(--acb)}

/* agent footer actions */
.aftr{padding:6px 10px;border-top:1px solid var(--b0);display:flex;align-items:center;gap:5px;background:var(--bg2);flex-shrink:0}
.fbtn{font-size:10px;font-weight:600;padding:3px 8px;border:1px solid var(--b1);border-radius:var(--rsm);cursor:pointer;background:transparent;color:var(--t1);transition:background .1s,color .1s;font-family:var(--sans)}
.fbtn:hover{background:var(--bg3);color:var(--t0)}
.fbtn.d:hover{background:var(--red);color:var(--re);border-color:rgba(239,68,68,.3)}
.fsp{flex:1}
.nos{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t2);gap:8px;padding:20px}
.nos p{font-size:12px;text-align:center;line-height:1.6}

/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000}
.mod{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rxl);padding:20px;width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.mod-t{font-size:14px;font-weight:700;color:var(--t0);margin-bottom:3px}
.mod-s{font-size:11px;color:var(--t2);margin-bottom:14px;line-height:1.5}
.fl{margin-bottom:11px}
.fl label{font-size:11px;color:var(--t1);display:block;margin-bottom:3px;font-weight:600}
.fsel,.fins{width:100%;padding:7px 9px;font-size:12px;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--rmd);color:var(--t0);font-family:var(--sans);outline:none;transition:border-color .1s}
.fsel:focus,.fins:focus{border-color:var(--acb)}
option{background:var(--bg3)}
.fn{font-size:10px;color:var(--t2);margin-top:3px;line-height:1.4}
.fn code{font-family:var(--mono);background:var(--bg3);padding:1px 4px;border-radius:3px;color:var(--ac)}
.workspace-note{background:var(--bg3);border:1px solid var(--b0);border-radius:var(--rmd);padding:8px 10px;margin-top:4px}
.workspace-note-lbl{font-size:10px;font-weight:600;color:var(--ac);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.workspace-note p{font-size:11px;color:var(--t2);line-height:1.5}
.mact{display:flex;gap:7px;justify-content:flex-end;margin-top:15px}
.btn{padding:6px 14px;border-radius:var(--rmd);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--sans)}
.btn-g{background:transparent;border:1px solid var(--b1);color:var(--t1)}
.btn-g:hover{background:var(--bg3)}
.btn-p{background:var(--ac);color:#0a0a0c}
.btn-p:hover{opacity:.9}
.btn-r{background:var(--re);color:#fff}

/* animations */
.rdots{display:inline-flex;align-items:center;gap:2px}
.rd{width:3px;height:3px;border-radius:50%;background:var(--ac);animation:rd 1.2s ease-in-out infinite}
.rd:nth-child(2){animation-delay:.2s}
.rd:nth-child(3){animation-delay:.4s}
@keyframes rd{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.cur{display:inline-block;width:7px;height:11px;background:var(--ac);border-radius:1px;animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>

<body>
<div id="root"></div>
<script>
(function(){
const {createElement:h,useState,useEffect,useRef,useMemo,useCallback,Fragment}=React;
const gid=()=>Math.random().toString(36).slice(2,8);
const DEF_LEFT_W=200,DEF_RIGHT_W=340,MIN_LEFT_W=180,MAX_LEFT_W=360,MIN_RIGHT_W=260,MAX_RIGHT_W=520,MIN_CENTER_W=360,RESIZER_W=24;
function fmtTs(ts){return new Date(ts).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}
function fmtAgo(ts){if(ts==null)return '-';const d=Date.now()-ts,m=Math.floor(d/60000),hh=Math.floor(d/3600000);if(m<1)return 'now';if(m<60)return m+'m';if(hh<24)return hh+'h';return Math.floor(hh/24)+'d'}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function inMd(s){return escH(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/~~([^~]+)~~/g,'<s>$1</s>')}
function renderMd(text){if(!text)return '';return text.split('\n').map(function(line){if(/^#{1,3} /.test(line)){var lv=line.match(/^#+/)[0].length;return '<h'+Math.min(lv+2,6)+'>'+inMd(line.replace(/^#+\s/,''))+'</h'+Math.min(lv+2,6)+'>';}if(line.startsWith('> '))return '<blockquote>'+inMd(line.slice(2))+'</blockquote>';var tkm=line.match(/^- \[([ x])\] (.+)/);if(tkm){var ck=tkm[1]==='x';return '<div class="tki '+(ck?'ck':'')+'"><span class="tkc">'+(ck?'&#10003;':'')+'</span><span>'+inMd(tkm[2])+'</span></div>';}if(/^[-*] /.test(line))return '<li>'+inMd(line.slice(2))+'</li>';if(line.trim()==='')return '<br/>';return '<p>'+inMd(line)+'</p>';}).join('');}
function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
function readStoredNumber(key,fallback){try{var v=parseInt(localStorage.getItem(key)||'',10);return Number.isFinite(v)?v:fallback;}catch(e){return fallback;}}
function readStoredValue(key,fallback){try{var v=localStorage.getItem(key);return v||fallback;}catch(e){return fallback;}}
function storeValue(key,value){try{localStorage.setItem(key,String(value));}catch(e){}}
function normalizePaneWidths(leftWidth,rightWidth,totalWidth){
  var safeTotal=totalWidth||window.innerWidth||1440;
  var leftMax=Math.max(MIN_LEFT_W,Math.min(MAX_LEFT_W,safeTotal-MIN_CENTER_W-MIN_RIGHT_W-RESIZER_W));
  var left=clamp(leftWidth,MIN_LEFT_W,leftMax);
  var rightMax=Math.max(MIN_RIGHT_W,Math.min(MAX_RIGHT_W,safeTotal-MIN_CENTER_W-left-RESIZER_W));
  var right=clamp(rightWidth,MIN_RIGHT_W,rightMax);
  leftMax=Math.max(MIN_LEFT_W,Math.min(MAX_LEFT_W,safeTotal-MIN_CENTER_W-right-RESIZER_W));
  left=clamp(left,MIN_LEFT_W,leftMax);
  return {left:left,right:right};
}
document.body.setAttribute('data-theme',readStoredValue('orbit.theme','dark'));

// ── WORKSPACE.md template ──
function buildWorkspaceMd(todoTitle, todoNote, date, todoId){
  return [
    '# WORKSPACE.md — ' + todoTitle,
    '',
    '> Auto-generated by Orbit on ' + new Date(Date.now()).toISOString().slice(0,16).replace('T',' '),
    '> Do not delete this file — Orbit uses it to track workspace state.',
    '',
    '## Task',
    todoNote || '_No description provided._',
    '',
    '## Directory Structure',
    '```',
    'todo_' + todoId + '/',
    '├── WORKSPACE.md          ← this file (READ-ONLY for agent)',
    '├── .todo.json            ← todo metadata (READ-ONLY for agent)',
    '├── agents/',
    '│   └── <agent-id>/',
    '│       ├── session.json  ← agent session state',
    '│       ├── log.jsonl     ← full execution log',
    '│       └── attachments/  ← images/files sent by user',
    '└── <your work files>     ← create files here freely',
    '```',
    '',
    '## Permissions',
    '| Path | Access |',
    '|------|--------|',
    '| `WORKSPACE.md` | Read-only |',
    '| `.todo.json` | Read-only |',
    '| `agents/` | Read-only (your own session folder is writable) |',
    '| Everything else in this folder | Read + Write |',
    '',
    '## Files Created',
    '_No files created yet._',
  ].join('\n');
}

// ── API + WebSocket ──
var _searchParams=new URLSearchParams(window.location.search);
function trimSlash(url){return url?url.replace(/\/+$/,''):url;}
var API_ORIGIN=trimSlash(_searchParams.get('apiOrigin')||'http://localhost:3001');
var WS_ORIGIN=trimSlash(_searchParams.get('wsOrigin')||API_ORIGIN.replace(/^http/,'ws'));
var BASE=API_ORIGIN+'/api';
var WS_URL=WS_ORIGIN+'/ws';
var _ws=null;
var _wsHandlers={};
function wsOn(type,fn){if(!_wsHandlers[type])_wsHandlers[type]=[];_wsHandlers[type].push(fn);}
function wsOff(type,fn){if(_wsHandlers[type])_wsHandlers[type]=_wsHandlers[type].filter(h=>h!==fn);}
function wsConnect(){
  if(_ws&&(_ws.readyState===0||_ws.readyState===1))return;
  _ws=new WebSocket(WS_URL);
  _ws.onmessage=function(e){try{var m=JSON.parse(e.data);(_wsHandlers[m.type]||[]).forEach(h=>h(m.payload));}catch(err){}};
  _ws.onclose=function(){setTimeout(wsConnect,2000);};
  _ws.onerror=function(){};
}
wsConnect();

async function apiFetch(path,opts){
  var r=await fetch(BASE+path,{...opts,headers:{'Content-Type':'application/json',...(opts&&opts.headers)}});
  if(r.status===204)return null;
  var isJson=(r.headers.get('content-type')||'').includes('application/json');
  var body=isJson?await r.json():await r.text();
  if(!r.ok){
    var msg=(body&&body.error)||(body&&body.message)||(typeof body==='string'&&body)||('Request failed: '+r.status);
    throw new Error(msg);
  }
  return body;
}
var _debounceTimers={};
function debounce(key,fn,ms){clearTimeout(_debounceTimers[key]);_debounceTimers[key]=setTimeout(fn,ms);}

// ── helpers ──
function RunDots(){return h('span',{className:'rdots'},h('span',{className:'rd'}),h('span',{className:'rd'}),h('span',{className:'rd'}))}
function MdView(p){return h('div',{className:'md',dangerouslySetInnerHTML:{__html:renderMd(p.text)}})}

function toolIcon(tool){
  if(!tool)return {cls:'tbi-tool',sym:'⚙'};
  if(tool==='write_file'||tool==='create_file')return {cls:'tbi-write',sym:'✎'};
  if(tool==='read_file')return {cls:'tbi-read',sym:'◈'};
  if(tool==='list_directory')return {cls:'tbi-list',sym:'≡'};
  if(tool==='shell'||tool==='bash')return {cls:'tbi-tool',sym:'$'};
  return {cls:'tbi-tool',sym:'⚙'};
}

// ── ToolBlock (merged tool+result) ──
function ToolBlock({msg}){
  const[open,setOpen]=useState(false);
  const ic=toolIcon(msg.tool);
  let arg={};
  try{arg=msg.input?JSON.parse(msg.input):{}}catch(e){arg={};}
  const shortArg=arg.path||arg.command||(typeof msg.input==='string'&&!msg.input.startsWith('{')?msg.input:'');
  // pretty-print JSON input if possible
  let prettyInput=msg.input||'';
  try{prettyInput=JSON.stringify(JSON.parse(msg.input),null,2);}catch(e){}
  return h('div',{className:'tool-block'},
    h('div',{className:'tool-block-hdr',onClick:()=>setOpen(o=>!o)},
      h('div',{className:'tool-block-icon '+ic.cls},ic.sym),
      h('span',{className:'tool-block-name'},msg.tool||'tool'),
      shortArg&&h('span',{className:'tool-block-arg'},shortArg),
      h('span',{className:'tool-block-status '+(msg.status==='ok'?'tbs-ok':msg.status==='running'?'tbs-run':'tbs-err')},
        msg.status==='ok'?'done':msg.status==='running'?'running':'error'),
      h('span',{className:'tool-chevron'},open?'▴':'▾')
    ),
    open&&h('div',{className:'tool-block-body'},
      prettyInput&&h(Fragment,null,
        h('div',{className:'tool-section'},
          h('div',{className:'tool-section-lbl'},'input'),
          h('pre',null,prettyInput)
        ),
        msg.output&&h('div',{className:'tool-divider'})
      ),
      msg.output&&h(Fragment,null,
        h('div',{className:'tool-section'},
          h('div',{className:'tool-section-lbl'},'output'),
          h('pre',{style:{color:msg.status==='ok'?'var(--t1)':'var(--re)'}},msg.output)
        )
      )
    )
  )
}

// ── ThinkBlock — collapsible ──
function ThinkBlock({msg}){
  const[open,setOpen]=useState(false);
  const preview=msg.content.replace(/\n/g,' ').slice(0,60)+(msg.content.length>60?'\u2026':'');
  return h('div',{className:'think-block'},
    h('div',{className:'think-hdr',onClick:()=>setOpen(o=>!o)},
      h('div',{className:'think-icon'},'\u{1F9E0}'),
      h('span',{className:'think-label'},'thinking'),
      !open&&h('span',{className:'think-preview'},preview),
      h('span',{className:'think-chevron'},open?'▴':'▾')
    ),
    open&&h('div',{className:'think-body'},
      h('span',{className:'think-txt'},msg.content)
    )
  )
}

// ── ChatMessage ──
function ChatMessage({msg}){
  if(msg.kind==='sys')return h('div',{className:'sys-block'},
    h('div',{className:'sys-line'}),h('span',{className:'sys-txt'},msg.content),h('div',{className:'sys-line'})
  );
  if(msg.kind==='think')return h(ThinkBlock,{msg});
  if(msg.kind==='tool')return h(ToolBlock,{msg});
  if(msg.kind==='out')return h('div',{className:'out-block'},
    h('span',{className:'out-txt'},msg.content,msg.streaming&&h('span',{className:'cur'}))
  );
  if(msg.kind==='user')return h('div',{className:'user-msg'},
    msg.attachments&&msg.attachments.map((att,i)=>
      att.type==='image'
        ?h('div',{key:i,className:'user-bubble'},h('div',{className:'user-bubble-img'},h('img',{src:att.dataUrl,alt:att.name})))
        :h('div',{key:i,className:'user-bubble'},
            h('div',{className:'user-bubble-file'},
              h('div',{className:'user-file-icon'},att.ext||'?'),
              h('span',{className:'user-file-name'},att.name),
              att.size&&h('span',{className:'user-file-size'},att.size)
            ))
    ),
    msg.content&&h('div',{className:'user-bubble'},h('span',{className:'user-bubble-text'},msg.content)),
    h('div',{className:'user-ts'},fmtTs(msg.ts))
  );
  return null;
}

// ── RunGroup (collapsible run execution) ──
function RunGroup({messages,label}){
  const[expanded,setExpanded]=useState(true);
  const toolCt=messages.filter(m=>m.kind==='tool').length;
  return h(Fragment,null,
    h('div',{className:'run-summary',onClick:()=>setExpanded(o=>!o)},
      h('div',{className:'run-sum-ico'},h('svg',{width:10,height:10,viewBox:'0 0 10 10'},h('circle',{cx:5,cy:5,r:4,fill:'none',stroke:'#3ecf8e',strokeWidth:1.5}),h('circle',{cx:5,cy:5,r:1.8,fill:'#3ecf8e'}))),
      h('span',{className:'run-sum-label'},label||h(Fragment,null,h('em',null,toolCt),' tool calls')),
      h('span',{className:'run-sum-chevron'},expanded?'▴':'▾')
    ),
    expanded&&messages.map(m=>h(ChatMessage,{key:m.id,msg:m}))
  )
}

// ── Composer ──
function Composer({agentStatus,onSend}){
  const[val,setVal]=useState('');
  const[attachments,setAttachments]=useState([]);
  const[dragging,setDragging]=useState(false);
  const fileRef=useRef();
  const textRef=useRef();
  const canSend=agentStatus==='idle'||agentStatus==='running'||agentStatus==='finished'||agentStatus==='paused';
  const disabled=!canSend;

  function processFiles(files){
    Array.from(files).forEach(file=>{
      const ext=file.name.split('.').pop().toLowerCase();
      const isImg=['png','jpg','jpeg','gif','webp','svg'].includes(ext);
      const reader=new FileReader();
      reader.onload=e=>{
        setAttachments(prev=>[...prev,{
          id:gid(),name:file.name,type:isImg?'image':'file',
          file:file,
          dataUrl:e.target.result,
          ext:ext.toUpperCase(),
          size:file.size>1024*1024?(file.size/1024/1024).toFixed(1)+'MB':(file.size/1024).toFixed(0)+'KB'
        }]);
      };
      reader.readAsDataURL(file);
    });
  }

  function send(){
    if((!val.trim()&&!attachments.length)||disabled)return;
    onSend({text:val.trim(),attachments:[...attachments]});
    setVal('');setAttachments([]);
  }

  function onPaste(e){
    const items=e.clipboardData&&e.clipboardData.items;
    if(!items)return;
    const files=[];
    for(let i=0;i<items.length;i++){if(items[i].kind==='file')files.push(items[i].getAsFile());}
    if(files.length){e.preventDefault();processFiles(files);}
  }

  return h('div',{
    className:'composer'+(dragging?' drag-over':''),
    onDragOver:e=>{e.preventDefault();setDragging(true)},
    onDragLeave:()=>setDragging(false),
    onDrop:e=>{e.preventDefault();setDragging(false);processFiles(e.dataTransfer.files);}
  },
    attachments.length>0&&h('div',{className:'composer-attachments'},
      attachments.map(att=>h('div',{key:att.id,style:{position:'relative'}},
        att.type==='image'
          ?h('div',{className:'att-preview'},h('img',{src:att.dataUrl,alt:att.name}))
          :h('div',{className:'att-preview-file'},h('span',null,att.ext),h('span',null,att.name)),
        h('button',{className:'att-remove',onClick:()=>setAttachments(prev=>prev.filter(a=>a.id!==att.id))},'×')
      ))
    ),
    h('div',{className:'composer-row'},
      h('input',{type:'file',ref:fileRef,style:{display:'none'},multiple:true,onChange:e=>processFiles(e.target.files)}),
      h('button',{className:'attach-btn',disabled,onClick:()=>fileRef.current&&fileRef.current.click(),title:'Attach file or image'},
        h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},
          h('path',{d:'M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48'})
        )
      ),
      h('textarea',{
        ref:textRef,className:'composer-inp',disabled,
        placeholder:disabled?'Agent unavailable\u2026':'Message agent\u2026 (paste images, drag & drop files)',
        value:val,rows:1,
        onChange:e=>setVal(e.target.value),
        onPaste,
        onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
      }),
      h('button',{className:'send-btn',disabled:disabled||(!val.trim()&&!attachments.length),onClick:send},'Send')
    ),
    !disabled&&h('div',{className:'drop-hint'},

// ── App ──
function App(){
  const[todos,setTodos]=useState({});
  const[agents,setAgents]=useState({});
  const[dates,setDates]=useState([]);
  const[selDate,setSelDate]=useState(new Date().toISOString().slice(0,10));
  const[selTodo,setSelTodo]=useState(null);
  const[selAg,setSelAg]=useState(null);
  const[expIds,setExpIds]=useState(new Set());
  const[newAg,setNewAg]=useState(false);
  const[addingTodo,setAddingTodo]=useState(false);
  const[newTitle,setNewTitle]=useState('');
  const[theme,setTheme]=useState(()=>readStoredValue('orbit.theme','dark'));
  const[leftW,setLeftW]=useState(()=>readStoredNumber('orbit.leftWidth',DEF_LEFT_W));
  const[rightW,setRightW]=useState(()=>readStoredNumber('orbit.rightWidth',DEF_RIGHT_W));
  const[dragPane,setDragPane]=useState(null);
  const ntr=useRef();
  const appRef=useRef(null);

  useEffect(()=>{
    document.body.setAttribute('data-theme',theme);
    storeValue('orbit.theme',theme);
  },[theme]);

  useEffect(()=>{
    storeValue('orbit.leftWidth',leftW);
  },[leftW]);

  useEffect(()=>{
    storeValue('orbit.rightWidth',rightW);
  },[rightW]);

  useEffect(()=>{
    function syncWidths(){
      var next=normalizePaneWidths(leftW,rightW,window.innerWidth);
      if(next.left!==leftW)setLeftW(next.left);
      if(next.right!==rightW)setRightW(next.right);
    }
    syncWidths();
    window.addEventListener('resize',syncWidths);
    return()=>window.removeEventListener('resize',syncWidths);
  },[leftW,rightW]);

  useEffect(()=>{
    if(!dragPane)return;
    document.body.classList.add('is-resizing');
    function onMove(e){
      var rect=appRef.current?appRef.current.getBoundingClientRect():{left:0,right:window.innerWidth,width:window.innerWidth};
      if(dragPane==='left'){
        var nextLeft=normalizePaneWidths(e.clientX-rect.left,rightW,rect.width).left;
        setLeftW(nextLeft);
        return;
      }
      var nextRight=normalizePaneWidths(leftW,rect.right-e.clientX,rect.width).right;
      setRightW(nextRight);
    }
    function stopDrag(){
      document.body.classList.remove('is-resizing');
      setDragPane(null);
    }
    window.addEventListener('pointermove',onMove);
    window.addEventListener('pointerup',stopDrag);
    window.addEventListener('pointercancel',stopDrag);
    return()=>{
      document.body.classList.remove('is-resizing');
      window.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',stopDrag);
      window.removeEventListener('pointercancel',stopDrag);
    };
  },[dragPane,leftW,rightW]);

  // Load dates on mount
  useEffect(()=>{
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
  },[]);

  // Load todos when date changes
  useEffect(()=>{
    if(!selDate)return;
    apiFetch('/todos?date='+selDate).then(async rows=>{
      if(!rows)return;
      const map={};
      for(const t of rows){
        map[t.id]=t;
        for(const cid of(t.children||[])){
          const ch=await apiFetch('/todos/'+cid).catch(()=>null);
          if(ch)map[ch.id]=ch;
        }
        const ags=await apiFetch('/agents?todoId='+t.id).catch(()=>[]);
        for(const ag of(ags||[])){
          const full=await apiFetch('/agents/'+ag.id).catch(()=>null);
          if(full){
            setAgents(p=>({...p,[full.id]:{...full,messages:full.messages||[]}}));
          }
        }
      }
      setTodos(p=>({...p,...map}));
    }).catch(()=>{});
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
  },[selDate]);

  // WebSocket real-time events
  useEffect(()=>{
    function onAgentMessage({agentId,message}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        const msgs=[...(ag.messages||[])];
        const idx=msgs.findIndex(m=>m.id===message.id);
        if(idx>=0){msgs[idx]={...msgs[idx],...message};}else{msgs.push(message);}
        return {...p,[agentId]:{...ag,messages:msgs}};
      });
    }
    function onAgentStream({agentId,messageId,delta}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        const msgs=[...(ag.messages||[])];
        const idx=msgs.findIndex(m=>m.id===messageId);
        if(idx>=0){msgs[idx]={...msgs[idx],content:(msgs[idx].content||'')+delta};}
        else{msgs.push({id:messageId,kind:'out',content:delta,streaming:true,ts:Date.now()});}
        return {...p,[agentId]:{...ag,messages:msgs}};
      });
    }
    function onAgentStreamEnd({agentId,messageId}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        const msgs=(ag.messages||[]).map(m=>m.id===messageId?{...m,streaming:false}:m);
        return {...p,[agentId]:{...ag,messages:msgs}};
      });
    }
    function onAgentStatus({agentId,status,ctxPct,toolCalls}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        return {...p,[agentId]:{...ag,status,ctxPct:ctxPct!=null?ctxPct:ag.ctxPct,toolCalls:toolCalls!=null?toolCalls:ag.toolCalls}};
      });
    }
    function onAgentCtx({agentId,ctxPct}){
      setAgents(p=>{const ag=p[agentId];if(!ag)return p;return {...p,[agentId]:{...ag,ctxPct}};});
    }
    wsOn('agent:message',onAgentMessage);
    wsOn('agent:message:stream',onAgentStream);
    wsOn('agent:message:stream:end',onAgentStreamEnd);
    wsOn('agent:status',onAgentStatus);
    wsOn('agent:ctx',onAgentCtx);
    return()=>{
      wsOff('agent:message',onAgentMessage);
      wsOff('agent:message:stream',onAgentStream);
      wsOff('agent:message:stream:end',onAgentStreamEnd);
      wsOff('agent:status',onAgentStatus);
      wsOff('agent:ctx',onAgentCtx);
    };
  },[]);

  const rootTodos=useMemo(()=>Object.values(todos).filter(t=>t.date===selDate&&!t.parentId).sort((a,b)=>a.createdAt-b.createdAt),[todos,selDate]);
  const todo=todos[selTodo];
  const runCt=Object.values(agents).filter(a=>a.status==='running').length;

  function togExp(id){setExpIds(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function selTodoFn(id){setSelTodo(id);const t=todos[id];if(t&&t.agentIds&&t.agentIds.length)setSelAg(t.agentIds[0]);else setSelAg(null);}

  async function togTodo(id){
    const t=todos[id];if(!t)return;
    const ns=t.status==='done'?'pending':'done';
    setTodos(p=>({...p,[id]:{...p[id],status:ns,completedAt:ns==='done'?Date.now():undefined}}));
    apiFetch('/todos/'+id,{method:'PATCH',body:JSON.stringify({status:ns})}).catch(()=>{});
  }
  async function addSub(pid){
    const title=prompt('Sub-todo title:');if(!title||!title.trim())return;
    const parent=todos[pid];if(!parent)return;
    const created=await apiFetch('/todos',{method:'POST',body:JSON.stringify({date:parent.date,title:title.trim(),note:'',parentId:pid})});
    if(created){
      setTodos(p=>({...p,[created.id]:created,[pid]:{...p[pid],children:[...(p[pid].children||[]),created.id]}}));
      setExpIds(p=>new Set([...p,pid]));
    }
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
  }
  async function delTodo(id){
    const t=todos[id];
    await apiFetch('/todos/'+id,{method:'DELETE'});
    setTodos(p=>{const n={...p};if(t&&t.parentId&&n[t.parentId])n[t.parentId]={...n[t.parentId],children:(n[t.parentId].children||[]).filter(c=>c!==id)};([id,...(t&&t.children||[])]).forEach(tid=>delete n[tid]);return n;});
    setAgents(p=>{const n={...p};(t&&t.agentIds||[]).forEach(aid=>delete n[aid]);return n;});
    if(selTodo===id){setSelTodo(null);setSelAg(null);}
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
  }
  async function delAgent(aid){
    await apiFetch('/agents/'+aid,{method:'DELETE'});
    const ag=agents[aid];
    setAgents(p=>{const n={...p};delete n[aid];return n;});
    if(ag)setTodos(p=>{const t=p[ag.todoId];if(!t)return p;return {...p,[t.id]:{...t,agentIds:(t.agentIds||[]).filter(a=>a!==aid)}};});
    if(selAg===aid)setSelAg(null);
  }
  async function createAgent({cli,model,workspace,prompt}){
    if(!selTodo)return;
    try{
      const created=await apiFetch('/agents',{method:'POST',body:JSON.stringify({todoId:selTodo,cli,model,workspace:workspace||'',prompt:prompt||''})});
      if(!created||!created.id)throw new Error('Agent creation returned an invalid response');
      setAgents(p=>({...p,[created.id]:{...created,messages:created.messages||[]}}));
      setTodos(p=>({...p,[selTodo]:{...p[selTodo],agentIds:[...(p[selTodo].agentIds||[]),created.id]}}));
      setSelAg(created.id);setNewAg(false);
    }catch(err){
      alert('Failed to create agent: '+(err&&err.message?err.message:'unknown error'));
    }
  }
  async function addTodo(){
    if(!newTitle.trim()){setAddingTodo(false);return;}
    const created=await apiFetch('/todos',{method:'POST',body:JSON.stringify({date:selDate,title:newTitle.trim(),note:''})});
    if(created)setTodos(p=>({...p,[created.id]:created}));
    setNewTitle('');setAddingTodo(false);
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
  }
  function onUpdTitle(id,v){debounce('title_'+id,()=>apiFetch('/todos/'+id,{method:'PATCH',body:JSON.stringify({title:v})}),500);}
  function onUpdNote(id,v){debounce('note_'+id,()=>apiFetch('/todos/'+id,{method:'PATCH',body:JSON.stringify({note:v})}),500);}

  async function handleSend(agentId,{text,attachments}){
    try{
      let attachmentIds=[];
      if(attachments&&attachments.length>0){
        const form=new FormData();
        form.append('agentId',agentId);
        for(const att of attachments){if(att.file)form.append('file',att.file,att.name);}
        const r=await fetch(BASE+'/attachments',{method:'POST',body:form});
        const j=await r.json();
        if(!r.ok)throw new Error((j&&j.error)||'attachment upload failed');
        attachmentIds=(j.attachments||[]).map(a=>a.id);
      }
      await apiFetch('/agents/'+agentId+'/send',{method:'POST',body:JSON.stringify({text,attachmentIds})});
    }catch(err){
      alert('Failed to send message: '+(err&&err.message?err.message:'unknown error'));
    }
  }
  async function handleInterrupt(agentId){
    try{
      await apiFetch('/agents/'+agentId+'/interrupt',{method:'POST',body:JSON.stringify({})});
    }catch(err){
      alert('Failed to interrupt agent: '+(err&&err.message?err.message:'unknown error'));
    }
  }

  function fmtDateHdr(d){
    try{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}catch(e){return d;}
  }

  return h('div',{className:'app',ref:appRef},
    h(Sidebar,{todos,agents,dates,selDate,setSelDate,onSelectTodo:selTodoFn,width:leftW}),
    h('div',{className:'pane-resizer '+(dragPane==='left'?'on':''),onPointerDown:e=>{e.preventDefault();setDragPane('left');},title:'Drag to resize left panel'}),
    h('div',{className:'mc'},
      h('div',{className:'mc-hdr'},
        h('div',{className:'mc-date'},fmtDateHdr(selDate)),
        h('div',{className:'mc-meta'},rootTodos.length,' todos',runCt>0&&h(Fragment,null,' \u00b7 ',h('em',null,runCt,' running'))),
        h('button',{className:'hbtn ghost',onClick:()=>setTheme(p=>p==='dark'?'light':'dark')},theme==='dark'?'light':'dark'),
        !addingTodo&&h('button',{className:'hbtn pri',onClick:()=>{setAddingTodo(true);setTimeout(()=>ntr.current&&ntr.current.focus(),40);}},'+ New todo')
      ),
      h('div',{className:'tl'},
        rootTodos.map(t=>h(TodoCard,{key:t.id,todo:t,todos,agents,isSel:selTodo===t.id,isExp:expIds.has(t.id),onSel:selTodoFn,onToggle:togTodo,onToggleExp:togExp,onToggleSub:togTodo,onAddSub:addSub,onDel:delTodo,onUpdTitle,onUpdNote})),
        addingTodo
          ?h('div',{className:'new-ti'},h('div',{className:'chk'}),h('input',{ref:ntr,className:'iedit',placeholder:'Todo title\u2026 (Enter to save, Esc to cancel)',value:newTitle,onChange:e=>setNewTitle(e.target.value),onBlur:addTodo,onKeyDown:e=>{if(e.key==='Enter')addTodo();if(e.key==='Escape'){setAddingTodo(false);setNewTitle('');}}})
)
          :h('div',{className:'add-t',onClick:()=>{setAddingTodo(true);setTimeout(()=>ntr.current&&ntr.current.focus(),40);}},h('span',{style:{fontSize:16,lineHeight:1}},'+'),' Add todo')
      )
    ),
    h('div',{className:'pane-resizer '+(dragPane==='right'?'on':''),onPointerDown:e=>{e.preventDefault();setDragPane('right');},title:'Drag to resize right panel'}),
    h(AgentPanel,{todo:todo||null,agents,selAgId:selAg,onSelAg:setSelAg,onNew:()=>setNewAg(true),onDelAgent:delAgent,onSend:handleSend,onInterrupt:handleInterrupt,width:rightW}),
    newAg&&todo&&h(NewAgentModal,{todo,onClose:()=>setNewAg(false),onCreate:createAgent})
  )
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
})();
</script>
</body>
</html>
