<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Orbit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"/>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0e0e10;--bg1:#141416;--bg2:#1a1a1e;--bg3:#222228;--bg4:#2a2a32;
  --b0:rgba(255,255,255,0.06);--b1:rgba(255,255,255,0.11);--b2:rgba(255,255,255,0.18);
  --t0:#f0f0f2;--t1:#a0a0b8;--t2:#5a5a78;--t3:#2e2e44;
  --ac:#3ecf8e;--acd:rgba(62,207,142,0.12);--acb:rgba(62,207,142,0.28);
  --am:#f59e0b;--amd:rgba(245,158,11,0.1);--amb:rgba(245,158,11,0.25);
  --re:#ef4444;--red:rgba(239,68,68,0.1);
  --bl:#60a5fa;--bld:rgba(96,165,250,0.1);--blb:rgba(96,165,250,0.22);
  --pu:#a78bfa;--pud:rgba(167,139,250,0.1);
  --pk:#f472b6;--pkd:rgba(244,114,182,0.12);--pkb:rgba(244,114,182,0.28);
  --sans:'Nunito',-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  --mono:"SF Mono","Fira Code","Cascadia Code",Consolas,monospace;
  --rsm:8px;--rmd:12px;--rlg:16px;--rxl:20px;
  --kawaii-shadow:0 2px 12px rgba(62,207,142,0.08);
  --kawaii-glow:0 0 16px rgba(62,207,142,0.15);
}
html,body,#root{height:100%}
body{font-family:var(--sans);background:var(--bg0);color:var(--t0);overflow:hidden;font-size:13px;-webkit-font-smoothing:antialiased;transition:background .3s ease,color .3s ease}
body[data-theme='light']{
  --bg0:#efe7da;--bg1:#fbf7ef;--bg2:#f5eee2;--bg3:#eadfce;--bg4:#ddd0bb;
  --b0:rgba(70,52,31,0.08);--b1:rgba(70,52,31,0.14);--b2:rgba(70,52,31,0.24);
  --t0:#241d14;--t1:#5d5347;--t2:#8c7d6d;--t3:#b8aa98;
  --ac:#169b62;--acd:rgba(22,155,98,0.12);--acb:rgba(22,155,98,0.24);
  --am:#c67a00;--amd:rgba(198,122,0,0.12);--amb:rgba(198,122,0,0.22);
  --re:#d14d3b;--red:rgba(209,77,59,0.1);
  --bl:#2563eb;--bld:rgba(37,99,235,0.1);--blb:rgba(37,99,235,0.22);
  --pu:#7c3aed;--pud:rgba(124,58,237,0.1);
  --pk:#db2777;--pkd:rgba(219,39,119,0.12);--pkb:rgba(219,39,119,0.28);
  --kawaii-shadow:0 2px 12px rgba(22,155,98,0.1);
  --kawaii-glow:0 0 16px rgba(22,155,98,0.18);
}
body.is-resizing,body.is-resizing *{cursor:col-resize!important;user-select:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--acb)}
.app{display:flex;height:100vh;position:relative}
.pane-resizer{width:12px;flex-shrink:0;cursor:col-resize;position:relative;background:transparent;touch-action:none}
.pane-resizer::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:var(--b0)}
.pane-resizer::after{content:'';position:absolute;left:3px;top:50%;transform:translateY(-50%);width:5px;height:56px;border-radius:999px;background:linear-gradient(180deg,transparent,var(--b1),transparent);opacity:.65;transition:opacity .12s,background .12s}
.pane-resizer:hover::after,.pane-resizer.on::after{opacity:1;background:linear-gradient(180deg,transparent,var(--acb),transparent)}

/* ── KAWAII ANIMATIONS ── */
@keyframes kawaii-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes kawaii-bounce{0%,100%{transform:scale(1)}30%{transform:scale(1.15)}60%{transform:scale(0.95)}}
@keyframes kawaii-sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(180deg)}}
@keyframes kawaii-wiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
@keyframes kawaii-pop{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes kawaii-pulse-ring{0%{transform:scale(0.9);opacity:0.6}100%{transform:scale(1.6);opacity:0}}
@keyframes kawaii-star-spin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
@keyframes kawaii-heart{0%,100%{transform:scale(1)}10%{transform:scale(1.15)}20%{transform:scale(1)}30%{transform:scale(1.1)}40%{transform:scale(1)}}
@keyframes kawaii-orbit{0%{transform:rotate(0deg) translateX(8px) rotate(0deg)}100%{transform:rotate(360deg) translateX(8px) rotate(-360deg)}}

/* ── SIDEBAR ── */
.sb{width:200px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--b0);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:13px 12px 10px;border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:8px}
.logo-mark{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--pk));display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;box-shadow:0 0 12px rgba(62,207,142,0.3);animation:kawaii-float 3s ease-in-out infinite}
.logo-mark::after{content:'✦';position:absolute;top:-3px;right:-4px;font-size:8px;color:var(--pk);animation:kawaii-sparkle 2s ease-in-out infinite}
.logo-text{font-size:15px;font-weight:800;letter-spacing:-.2px;background:linear-gradient(135deg,var(--ac),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* search */
.sb-search{padding:8px 8px 6px}
.search-wrap{position:relative}
.search-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--t2);pointer-events:none;transition:color .2s}
.search-inp{width:100%;background:var(--bg3);border:1.5px solid var(--b0);border-radius:99px;padding:6px 10px 6px 28px;font-size:11px;color:var(--t0);outline:none;font-family:var(--sans);transition:border-color .2s,box-shadow .2s}
.search-inp:focus{border-color:var(--acb);box-shadow:0 0 0 3px var(--acd)}
.search-inp:focus~.search-ico{color:var(--ac)}
.search-inp::placeholder{color:var(--t3)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--bg4);border:none;cursor:pointer;color:var(--t2);font-size:10px;padding:0;line-height:1;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s,transform .15s}
.search-clear:hover{color:var(--t0);background:var(--re);transform:translateY(-50%) scale(1.1)}

.sb-sec{padding:4px 6px 2px}
.sb-lbl{font-size:9px;font-weight:700;color:var(--t2);padding:4px 7px 2px;letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.sb-lbl::before{content:'◇';font-size:7px;color:var(--pk);animation:kawaii-star-spin 4s linear infinite}
.date-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:var(--rlg);cursor:pointer;font-size:12px;color:var(--t1);transition:all .2s ease;position:relative}
.date-row:hover{background:var(--bg3);color:var(--t0);transform:translateX(2px)}
.date-row.on{background:linear-gradient(135deg,var(--acd),var(--pkd));color:var(--t0);border:1px solid var(--acb)}
.date-row.dim{opacity:.45}
.ddot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:transform .2s}
.date-row:hover .ddot{transform:scale(1.3);animation:kawaii-pulse-ring 1s ease-out}
.dprog{margin-left:auto;font-size:10px;color:var(--t2);background:var(--bg3);padding:1px 6px;border-radius:99px;font-weight:600}

/* search results in sidebar */
.search-results{flex:1;overflow-y:auto;padding:4px 6px}
.sr-item{padding:7px 9px;border-radius:var(--rlg);cursor:pointer;transition:all .2s ease}
.sr-item:hover{background:var(--bg3);transform:translateX(2px)}
.sr-date{font-size:10px;color:var(--t2);margin-bottom:2px;font-weight:600}
.sr-title{font-size:12px;color:var(--t0);font-weight:700;line-height:1.4}
.sr-match{font-size:10px;color:var(--t1);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-empty{padding:16px 10px;text-align:center;font-size:11px;color:var(--t2)}

.sb-bot{margin-top:auto;padding:8px;border-top:1px solid var(--b0)}
.wspath{font-family:var(--mono);font-size:10px;color:var(--t2);padding:5px 7px;background:var(--bg2);border-radius:var(--rmd);display:flex;align-items:flex-start;gap:5px;line-height:1.5;word-break:break-all;border:1px solid var(--b0)}

/* ── MAIN COL ── */
.mc{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mc-hdr{padding:10px 14px;border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:10px;background:var(--bg1);flex-shrink:0}
.mc-date{font-size:15px;font-weight:800;letter-spacing:-.3px}
.mc-meta{font-size:11px;color:var(--t2);margin-left:auto;font-weight:600}
.mc-meta em{color:var(--ac);font-style:normal;font-weight:700}
.hbtn{padding:5px 13px;font-size:11px;font-weight:700;border:1.5px solid var(--b1);border-radius:99px;cursor:pointer;background:transparent;color:var(--t1);transition:all .2s ease;font-family:var(--sans)}
.hbtn:hover{background:var(--bg3);color:var(--t0);transform:translateY(-1px);box-shadow:var(--kawaii-shadow)}
.hbtn:active{transform:translateY(0) scale(0.97)}
.hbtn.pri{background:linear-gradient(135deg,var(--ac),#5edda5);border-color:var(--ac);color:#0a0a0c;box-shadow:0 2px 10px rgba(62,207,142,0.25)}
.hbtn.pri:hover{background:linear-gradient(135deg,#4de09e,#6ee8b7);box-shadow:0 4px 16px rgba(62,207,142,0.35);transform:translateY(-2px)}
.hbtn.pri:active{transform:translateY(0) scale(0.97)}
.hbtn.ghost{min-width:82px}
.tl{flex:1;overflow-y:auto;padding:9px}

/* ── TODO CARD ── */
.tc{background:var(--bg2);border:1.5px solid var(--b0);border-radius:var(--rxl);margin-bottom:8px;overflow:hidden;transition:all .25s ease;animation:kawaii-pop .3s ease-out}
.tc:hover{border-color:var(--b1);box-shadow:var(--kawaii-shadow);transform:translateY(-1px)}
.tc.sel{border-color:var(--acb);box-shadow:0 0 0 3px var(--acd)}
.tc.done-c{opacity:.5}
.tc-row{display:flex;align-items:flex-start;gap:9px;padding:11px 12px;cursor:pointer}
.chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--b1);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s ease;position:relative}
.chk:hover{border-color:var(--pk);transform:scale(1.15);box-shadow:0 0 8px var(--pkd)}
.chk.ck{background:linear-gradient(135deg,var(--ac),var(--pk));border-color:transparent;animation:kawaii-bounce .4s ease}
.chk.ck::after{content:'✔';display:block;font-size:10px;color:#fff;line-height:1}
.chk.part{background:var(--acd);border-color:var(--acb)}
.chk.part::after{content:'';display:block;width:7px;height:2px;background:var(--ac);border-radius:1px}
.tbody{flex:1;min-width:0}
.ttl{font-size:13px;font-weight:700;color:var(--t0);line-height:1.4}
.ttl.dn{text-decoration:line-through;color:var(--t2)}
.tnp{font-size:11px;color:var(--t2);margin-top:4px;max-width:360px;max-height:42px;overflow:hidden}
.tnp .md p,.tnp .md li,.tnp .md blockquote,.tnp .md .tki span:last-child{font-size:11px;color:var(--t2);line-height:1.45}
.tnp .md h3,.tnp .md h4,.tnp .md h5{font-size:11px;margin:2px 0;color:var(--t1)}
.tnp .md code{font-size:10px;padding:0 4px}
.tnp .md .md-code,.tnp .md-math-block{margin:3px 0}
.chips{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;display:flex;align-items:center;gap:4px;transition:transform .15s}
.chip:hover{transform:scale(1.05)}
.c-run{background:var(--acd);color:var(--ac);border:1.5px solid var(--acb);animation:kawaii-pulse-ring 2s ease-in-out infinite alternate}
.c-fin{background:var(--bg3);color:var(--t2);border:1.5px solid var(--b0)}
.c-sub{background:var(--bg3);color:var(--t2);border:1.5px solid var(--b0)}
.c-noa{background:var(--amd);color:var(--am);border:1.5px solid var(--amb)}
.tacts{display:flex;align-items:center;gap:2px;flex-shrink:0}
.ibtn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:12px;border:none;background:transparent;transition:all .2s ease}
.ibtn:hover{background:var(--bg4);color:var(--t1);transform:scale(1.1)}
.ibtn.del:hover{background:var(--red);color:var(--re);animation:kawaii-wiggle .3s ease}
.subp{border-top:1px solid var(--b0);background:var(--bg1)}
.subi{padding:5px 11px 7px 37px}
.subr{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--b0)}
.subr:last-child{border-bottom:none}
.sch{width:15px;height:15px;border-radius:50%;border:2px solid var(--b1);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.sch:hover{border-color:var(--pk);transform:scale(1.15)}
.sch.ck{background:linear-gradient(135deg,var(--ac),var(--pk));border-color:transparent;animation:kawaii-bounce .4s ease}
.sch.ck::after{content:'✔';display:block;font-size:8px;color:#fff}
.stl{font-size:12px;color:var(--t1);flex:1}
.stl.dn{text-decoration:line-through;color:var(--t2)}
.spulse{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0;animation:kawaii-heart 2s ease-in-out infinite}
.sub-edit{flex:1;background:transparent;border:none;outline:none;font-family:var(--sans);font-size:12px;color:var(--t0)}
.sub-actions{display:flex;align-items:center;gap:2px;margin-left:auto}
.sub-btn{width:22px;height:22px;border:none;border-radius:50%;background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s ease}
.sub-btn:hover{background:var(--bg4);color:var(--t1);transform:scale(1.1)}
.sub-btn.del:hover{background:var(--red);color:var(--re)}
.add-sub{display:flex;align-items:center;gap:5px;padding:5px 0;cursor:pointer;color:var(--t2);font-size:11px;transition:all .2s}
.add-sub:hover{color:var(--ac);transform:translateX(3px)}
.nsplit{border-top:1px solid var(--b0);display:flex}
.nsplit-edit{flex:1;padding:9px 11px 11px 37px;background:var(--bg0);border-right:1px solid var(--b0)}
.nsplit-prev{flex:1;padding:9px 11px 11px 11px;background:var(--bg1);overflow-y:auto;max-height:200px}
.nsplit-label{font-size:10px;color:var(--t2);margin-bottom:5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.med{width:100%;background:transparent;border:none;outline:none;font-family:var(--mono);font-size:11px;color:var(--t1);resize:none;line-height:1.7;min-height:80px}
.md p{margin:2px 0;font-size:12px;color:var(--t1);line-height:1.7}
.md strong{color:var(--t0);font-weight:600}
.md em{font-style:italic}
.md s{text-decoration:line-through}
.md code{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:4px;color:var(--ac)}
.md blockquote{border-left:2px solid var(--acb);padding-left:9px;color:var(--t2);margin:3px 0;font-size:12px}
.md h3,.md h4,.md h5{font-size:12px;font-weight:700;color:var(--t0);margin:7px 0 2px}
.md li{margin-left:14px;margin-bottom:2px;font-size:12px;color:var(--t1);line-height:1.6}
.md .tki{display:flex;align-items:flex-start;gap:6px;margin:2px 0}
.md .tkc{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--b1);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--t2);margin-top:2px}
.md .tki.ck .tkc{background:var(--ac);color:#0a0a0c;border-color:var(--ac)}
.md .tki span:last-child{font-size:12px;color:var(--t1);line-height:1.5}
.md .tki.ck span:last-child{text-decoration:line-through;color:var(--t2)}
.iedit{width:100%;background:transparent;border:none;outline:none;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--t0)}
.iedit::placeholder{color:var(--t3)}
.add-t{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--rxl);border:2px dashed var(--b1);cursor:pointer;color:var(--t2);font-size:12px;font-weight:600;transition:all .2s ease;margin-top:3px}
.add-t:hover{background:var(--bg2);color:var(--ac);border-color:var(--acb);transform:translateY(-1px);box-shadow:var(--kawaii-shadow)}
.new-ti{background:var(--bg2);border:2px solid var(--acb);border-radius:var(--rxl);padding:10px 12px;margin-top:3px;display:flex;align-items:center;gap:9px;animation:kawaii-pop .25s ease-out;box-shadow:0 0 0 4px var(--acd)}
.del-conf{padding:12px;background:var(--red);border-top:1px solid rgba(239,68,68,.2);border-radius:0 0 var(--rxl) var(--rxl)}
.del-conf p{font-size:12px;color:var(--t1);margin-bottom:9px;line-height:1.5}

/* ── AGENT PANEL ── */
.ap{width:340px;flex-shrink:0;background:var(--bg1);border-left:1px solid var(--b0);display:flex;flex-direction:column;overflow:hidden}
.ap-hdr{padding:10px 12px;border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:8px;flex-shrink:0}
.ap-for{font-size:9px;color:var(--t2);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.ap-ttl{font-size:12px;font-weight:700;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.at-wrap{display:flex;padding:6px 7px 0;gap:3px;border-bottom:1px solid var(--b0);flex-shrink:0;overflow-x:auto}
.at-wrap::-webkit-scrollbar{height:0}
.atab{font-size:11px;font-weight:700;padding:5px 10px 6px;border-radius:var(--rmd) var(--rmd) 0 0;cursor:pointer;color:var(--t2);border:1.5px solid transparent;border-bottom:none;display:flex;align-items:center;gap:5px;transition:all .15s ease;white-space:nowrap;flex-shrink:0}
.atab:hover{color:var(--t1);background:var(--bg2);transform:translateY(-1px)}
.atab.on{color:var(--t0);background:var(--bg0);border-color:var(--b0);margin-bottom:-1px;border-bottom:1px solid var(--bg0)}
.atab .td{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.atab-add{font-size:16px;padding:4px 8px 5px;color:var(--t2);cursor:pointer;border-radius:var(--rmd) var(--rmd) 0 0;border:1.5px solid transparent;border-bottom:none;display:flex;align-items:center;transition:all .2s;flex-shrink:0}
.atab-add:hover{color:var(--ac);transform:scale(1.15) rotate(90deg)}

/* agent status bar */
.a-sbar{padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative}
.sdot.running{background:var(--ac);animation:glow 2s ease-in-out infinite}
.sdot.running::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--ac);animation:kawaii-pulse-ring 1.5s ease-out infinite}
.sdot.finished{background:var(--t3)}
.sdot.paused{background:var(--am);animation:kawaii-heart 2s ease-in-out infinite}
.sdot.error{background:var(--re);animation:kawaii-wiggle .5s ease infinite}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--ac)}50%{box-shadow:0 0 12px var(--ac),0 0 20px rgba(62,207,142,0.2)}}
.sname{font-size:11px;color:var(--t1);font-weight:700}
.smodel{font-size:10px;color:var(--t2);font-family:var(--mono)}
.astat{font-size:10px;color:var(--t2);margin-left:auto}

/* ctx + workspace */
.ctx-s{padding:5px 12px;background:var(--bg2);border-bottom:1px solid var(--b0);flex-shrink:0}
.ctx-r{display:flex;align-items:center;gap:7px}
.ctx-l{font-size:10px;color:var(--t2);flex-shrink:0;font-weight:700}
.ctx-b{flex:1;height:4px;background:var(--bg4);border-radius:99px;overflow:hidden}
.ctx-f{height:100%;border-radius:99px;transition:width .6s ease}
.ctx-p{font-size:10px;font-family:var(--mono);color:var(--t1);flex-shrink:0;min-width:28px;text-align:right;font-weight:700}
.ws-info{padding:5px 12px;border-bottom:1px solid var(--b0);flex-shrink:0;display:flex;align-items:center;gap:6px}
.ws-lbl{font-size:10px;color:var(--t2);font-weight:700}
.ws-path{font-family:var(--mono);font-size:10px;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--acd);color:var(--ac);border:1.5px solid var(--acb);flex-shrink:0}

/* ── CHAT THREAD ── */
.chat-thread{flex:1;overflow-y:auto;padding:10px 10px 6px;display:flex;flex-direction:column;gap:8px}

/* tool call block (merged) */
.tool-block{background:var(--bg0);border:1.5px solid var(--b0);border-radius:var(--rlg);overflow:hidden;transition:border-color .2s}
.tool-block:hover{border-color:var(--b1)}
.tool-block-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .15s}
.tool-block-hdr:hover{background:var(--bg2)}
.tool-block-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:transform .2s}
.tool-block-hdr:hover .tool-block-icon{transform:rotate(15deg) scale(1.1)}
.tbi-tool{background:var(--bld);color:var(--bl)}
.tbi-write{background:var(--acd);color:var(--ac)}
.tbi-read{background:var(--bg3);color:var(--t2)}
.tbi-list{background:var(--pud);color:var(--pu)}
.tool-block-name{font-size:11px;font-weight:700;color:var(--t0);font-family:var(--mono);flex:1}
.tool-block-arg{font-size:10px;color:var(--t2);font-family:var(--mono);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-block-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0}
.tbs-ok{background:var(--acd);color:var(--ac)}
.tbs-err{background:var(--red);color:var(--re)}
.tbs-run{background:var(--amd);color:var(--am);animation:kawaii-float 2s ease-in-out infinite}
.tool-chevron{color:var(--t2);font-size:10px;flex-shrink:0;transition:transform .2s}
.tool-block-body{border-top:1px solid var(--b0);background:var(--bg0)}
.tool-section{padding:6px 10px}
.tool-section-lbl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.tool-section pre{font-family:var(--mono);font-size:10px;color:var(--t2);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.tool-divider{height:1px;background:var(--b0);margin:0 10px}
.tool-result-ok{font-size:11px;color:var(--t1);font-family:var(--mono);padding:6px 10px;line-height:1.5}
.tool-result-err{font-size:11px;color:var(--re);font-family:var(--mono);padding:6px 10px}

/* think block — collapsible */
.think-block{background:var(--bg0);border:1.5px solid var(--amb);border-radius:var(--rlg);overflow:hidden;transition:border-color .2s}
.think-block:hover{border-color:var(--am)}
.think-hdr{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;transition:background .15s}
.think-hdr:hover{background:var(--bg2)}
.think-icon{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#a78bfa);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#fff;animation:kawaii-float 3s ease-in-out infinite;box-shadow:0 2px 8px rgba(245,158,11,0.3)}
.think-label{font-size:11px;font-weight:700;color:var(--am);flex:1}
.think-preview{font-size:10px;color:var(--t2);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.think-chevron{font-size:10px;color:var(--t2);flex-shrink:0;transition:transform .2s}
.think-body{border-top:1px solid var(--amb);padding:8px 10px 10px}
.think-txt{font-size:11px;color:var(--t2);line-height:1.7;font-style:italic;white-space:pre-wrap;word-break:break-word}

/* out block */
.out-block{background:linear-gradient(135deg,var(--acd),var(--pkd));border:1.5px solid var(--acb);border-radius:var(--rlg);padding:9px 12px;animation:kawaii-pop .3s ease-out}
.out-txt{font-size:12px;color:var(--t0);line-height:1.6}
/* plan block (out before tool calls = agent thinking/planning) */
.plan-block{background:linear-gradient(135deg,var(--amd),rgba(167,139,250,0.08));border:1.5px solid var(--amb);border-radius:var(--rlg);padding:9px 12px;animation:kawaii-pop .3s ease-out}
.plan-icon{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0;animation:kawaii-float 3.5s ease-in-out infinite;box-shadow:0 2px 8px rgba(245,158,11,0.3)}
.plan-label{font-size:9px;font-weight:800;color:var(--am);text-transform:uppercase;letter-spacing:.5px}

/* sys block */
.sys-block{display:flex;align-items:center;gap:6px}
.sys-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--b0),transparent)}
.sys-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border:1.5px solid var(--b0);border-radius:999px;background:var(--bg2)}
.sys-icon{width:16px;height:16px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--t2)}
.sys-txt{font-size:10px;color:var(--t3);white-space:nowrap}

/* user message bubble */
.user-msg{display:flex;flex-direction:column;align-items:flex-end;gap:4px;animation:kawaii-pop .25s ease-out}
.user-head{display:flex;align-items:center;gap:6px;padding-right:2px}
.user-icon{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1.5px solid var(--b1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--t1)}
.user-label{font-size:9px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.user-bubble{background:var(--bg3);border:1.5px solid var(--b1);border-radius:var(--rxl) var(--rxl) 4px var(--rxl);padding:9px 12px;max-width:85%}
.user-bubble-text{font-size:12px;color:var(--t0);line-height:1.6;word-break:break-word}
.user-bubble-img{margin-top:6px;border-radius:var(--rmd);overflow:hidden;max-width:220px;border:1.5px solid var(--b1)}
.user-bubble-img img{display:block;width:100%;height:auto;max-height:160px;object-fit:cover}
.user-bubble-file{margin-top:5px;display:flex;align-items:center;gap:6px;background:var(--bg2);border-radius:var(--rsm);padding:5px 8px;border:1px solid var(--b0)}
.user-file-icon{width:22px;height:22px;border-radius:4px;background:var(--bld);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--bl)}
.user-file-name{font-size:10px;color:var(--t1);font-family:var(--mono);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-file-size{font-size:10px;color:var(--t2)}
.user-ts{font-size:9px;color:var(--t3);padding-right:2px}

/* collapsed run summary */
.run-summary{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg2);border:1.5px solid var(--b0);border-radius:var(--rlg);cursor:pointer;transition:all .2s ease}
.run-summary:hover{background:var(--bg3);transform:translateY(-1px);box-shadow:var(--kawaii-shadow)}
.run-sum-ico{width:20px;height:20px;border-radius:50%;background:var(--acd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.run-sum-label{font-size:11px;color:var(--t1);flex:1;font-weight:600}
.run-sum-label em{color:var(--t0);font-style:normal;font-weight:700}
.run-sum-chevron{font-size:10px;color:var(--t2);transition:transform .2s}
.run-items{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.run-item{background:var(--bg1);border:1.5px solid var(--b0);border-radius:var(--rlg);overflow:hidden;animation:kawaii-pop .2s ease-out}
.run-item-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--b0)}
.run-item-name{font-size:11px;font-weight:700;color:var(--t0);font-family:var(--mono)}
.run-item-arg{font-size:10px;color:var(--t2);font-family:var(--mono);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.run-item-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0}
.run-item-body{padding:8px 10px;display:flex;flex-direction:column;gap:8px}
.run-item-sec{display:flex;flex-direction:column;gap:4px}
.run-item-sec label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.run-item-code{font-family:var(--mono);font-size:10px;line-height:1.6;color:var(--t1);white-space:pre-wrap;word-break:break-word;background:var(--bg0);border:1px solid var(--b0);border-radius:var(--rmd);padding:8px}

/* ── COMPOSER ── */
.composer{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--b0)}
.composer-attachments{padding:6px 10px 0;display:flex;gap:5px;flex-wrap:wrap}
.att-preview{position:relative;width:48px;height:48px;border-radius:var(--rmd);overflow:hidden;border:1.5px solid var(--b1);transition:transform .2s}
.att-preview:hover{transform:scale(1.05)}
.att-preview img{width:100%;height:100%;object-fit:cover}
.att-preview-file{width:48px;height:48px;border-radius:var(--rmd);background:var(--bld);border:1.5px solid var(--blb);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.att-preview-file span:first-child{font-size:9px;font-weight:800;color:var(--bl);text-transform:uppercase}
.att-preview-file span:last-child{font-size:8px;color:var(--t2);max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-remove{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(239,68,68,.85);border:none;cursor:pointer;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;line-height:1;transition:transform .15s}
.att-remove:hover{transform:scale(1.2)}
.composer-row{display:flex;align-items:flex-end;gap:6px;padding:7px 10px}
.composer-inp{flex:1;background:var(--bg0);border:1.5px solid var(--b1);border-radius:var(--rxl);padding:8px 12px;font-size:12px;font-family:var(--sans);color:var(--t0);outline:none;resize:none;line-height:1.5;max-height:100px;min-height:36px;transition:border-color .2s,box-shadow .2s}
.composer-inp:focus{border-color:var(--acb);box-shadow:0 0 0 3px var(--acd)}
.composer-inp::placeholder{color:var(--t3)}
.composer-inp:disabled{opacity:.4}
.attach-btn{width:32px;height:32px;border-radius:50%;background:transparent;border:1.5px solid var(--b1);cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s ease}
.attach-btn:hover{background:var(--bg3);color:var(--t1);transform:rotate(15deg) scale(1.05)}
.send-btn{padding:8px 16px;background:linear-gradient(135deg,var(--ac),#5edda5);border:none;border-radius:99px;cursor:pointer;font-size:11px;font-weight:800;color:#0a0a0c;font-family:var(--sans);flex-shrink:0;transition:all .2s ease;box-shadow:0 2px 8px rgba(62,207,142,0.25)}
.send-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 14px rgba(62,207,142,0.35)}
.send-btn:active{transform:translateY(0) scale(0.97)}
.send-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.cancel-btn{width:34px;height:34px;border-radius:50%;background:rgba(239,68,68,.12);border:2px solid rgba(239,68,68,.45);cursor:pointer;color:#ef4444;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s ease}
.cancel-btn:hover{background:rgba(239,68,68,.25);border-color:#ef4444;transform:scale(1.08)}
.drop-hint{font-size:10px;color:var(--t2);text-align:center;padding:4px 0 6px;display:flex;align-items:center;justify-content:center;gap:4px}
.composer.drag-over{border-color:var(--acb);box-shadow:inset 0 0 0 2px var(--acb),0 0 20px var(--acd)}

/* agent footer actions */
.aftr{padding:6px 10px;border-top:1px solid var(--b0);display:flex;align-items:center;gap:5px;background:var(--bg2);flex-shrink:0}
.fbtn{font-size:10px;font-weight:700;padding:4px 10px;border:1.5px solid var(--b1);border-radius:99px;cursor:pointer;background:transparent;color:var(--t1);transition:all .2s ease;font-family:var(--sans)}
.fbtn:hover{background:var(--bg3);color:var(--t0);transform:translateY(-1px)}
.fbtn:active{transform:translateY(0) scale(0.97)}
.fbtn.d:hover{background:var(--red);color:var(--re);border-color:rgba(239,68,68,.3)}
.fbtn[disabled]{opacity:.4;cursor:default;transform:none}
.fsp{flex:1}
.nos{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t2);gap:10px;padding:20px}
.nos p{font-size:12px;text-align:center;line-height:1.6}

/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.mod{background:var(--bg2);border:1.5px solid var(--b1);border-radius:var(--rxl);padding:22px;width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 0 1px var(--b0);animation:kawaii-pop .3s ease-out}
.mod-t{font-size:15px;font-weight:800;color:var(--t0);margin-bottom:3px}
.mod-s{font-size:11px;color:var(--t2);margin-bottom:14px;line-height:1.5}
.fl{margin-bottom:11px}
.fl label{font-size:11px;color:var(--t1);display:block;margin-bottom:3px;font-weight:700}
.fsel,.fins{width:100%;padding:8px 10px;font-size:12px;background:var(--bg3);border:1.5px solid var(--b1);border-radius:var(--rmd);color:var(--t0);font-family:var(--sans);outline:none;transition:border-color .2s,box-shadow .2s}
.fsel:focus,.fins:focus{border-color:var(--acb);box-shadow:0 0 0 3px var(--acd)}
option{background:var(--bg3)}
.fn{font-size:10px;color:var(--t2);margin-top:3px;line-height:1.4}
.fn code{font-family:var(--mono);background:var(--bg3);padding:1px 4px;border-radius:4px;color:var(--ac)}
.opt-card{margin-top:10px;padding:10px 11px;border:1.5px solid var(--b0);border-radius:var(--rmd);background:var(--bg1)}
.opt-card-lbl{font-size:10px;font-weight:800;color:var(--t1);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.opt-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0}
.opt-row+.opt-row{border-top:1px solid var(--b0)}
.opt-check{margin-top:2px}
.opt-body{flex:1}
.opt-title{font-size:11px;color:var(--t0);font-weight:700}
.opt-desc{font-size:10px;color:var(--t2);line-height:1.5;margin-top:2px}
.workspace-note{background:var(--bg3);border:1.5px solid var(--b0);border-radius:var(--rmd);padding:8px 10px;margin-top:4px}
.workspace-note-lbl{font-size:10px;font-weight:700;color:var(--ac);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.workspace-note p{font-size:11px;color:var(--t2);line-height:1.5}
/* folder pick row */
.ws-pick-row{display:flex;gap:5px;align-items:center}
.ws-pick-row .fins{flex:1;min-width:0}
.ws-pick-btn{flex-shrink:0;height:34px;padding:0 11px;border-radius:var(--rmd);border:1.5px solid var(--b1);background:var(--bg3);color:var(--t1);font-size:11px;font-weight:700;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s ease;white-space:nowrap}
.ws-pick-btn:hover{background:var(--bg4);color:var(--t0);border-color:var(--acb);transform:translateY(-1px)}
.ws-pick-btn:active{transform:translateY(0) scale(.97)}
.mact{display:flex;gap:7px;justify-content:flex-end;margin-top:15px}
.btn{padding:7px 16px;border-radius:99px;font-size:12px;font-weight:800;cursor:pointer;border:none;font-family:var(--sans);transition:all .2s ease}
.btn:active{transform:scale(0.97)}
.btn-g{background:transparent;border:1.5px solid var(--b1);color:var(--t1)}
.btn-g:hover{background:var(--bg3);transform:translateY(-1px)}
.btn-p{background:linear-gradient(135deg,var(--ac),#5edda5);color:#0a0a0c;box-shadow:0 2px 8px rgba(62,207,142,0.25)}
.btn-p:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 14px rgba(62,207,142,0.35)}
.btn-r{background:linear-gradient(135deg,var(--re),#f87171);color:#fff}

/* waiting bubble */
.waiting-bubble{display:flex;align-items:center;gap:8px;padding:4px 0}
.waiting-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1.5px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;animation:kawaii-float 2s ease-in-out infinite}
.waiting-dots{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1.5px solid var(--b1);border-radius:99px 99px 99px 4px;padding:8px 14px}
.wdot{width:7px;height:7px;border-radius:50%;animation:wdot-jump 1.1s ease-in-out infinite}
.wdot:nth-child(1){background:var(--ac);animation-delay:0s}
.wdot:nth-child(2){background:var(--pk);animation-delay:.18s}
.wdot:nth-child(3){background:var(--bl);animation-delay:.36s}
@keyframes wdot-jump{0%,80%,100%{transform:translateY(0) scale(1);opacity:.5}40%{transform:translateY(-6px) scale(1.15);opacity:1}}
/* animations */
.rdots{display:inline-flex;align-items:center;gap:3px}
.rd{width:4px;height:4px;border-radius:50%;background:var(--ac);animation:rd 1.2s ease-in-out infinite}
.rd:nth-child(2){animation-delay:.2s}
.rd:nth-child(3){animation-delay:.4s}
@keyframes rd{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1.2)}}
.cur{display:inline-block;width:2px;height:14px;background:linear-gradient(180deg,var(--ac),var(--pk));border-radius:1px;animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* token display */
.ctx-tokens{font-size:9px;color:var(--t2);text-align:right;font-family:var(--mono);padding:1px 12px 4px}
/* out block icon */
.out-hdr{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.out-icon{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#3ecf8e,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;animation:kawaii-float 3s ease-in-out infinite;box-shadow:0 2px 8px rgba(62,207,142,0.3)}
.out-label{font-size:9px;font-weight:800;color:var(--ac);text-transform:uppercase;letter-spacing:.5px}
/* md code block */
.md-code{background:var(--bg3);border-radius:var(--rmd);padding:7px 10px;margin:5px 0;overflow-x:auto;border:1.5px solid var(--b0)}
.md-code code{font-family:var(--mono);font-size:10px;color:var(--t1);white-space:pre;display:block;line-height:1.6}
.md-math-block{margin:6px 0;overflow-x:auto}
.md .katex-display{margin:.2em 0}
.md .katex{font-size:1.05em}
.math-inline,.math-block{font-family:var(--mono);color:var(--am)}
/* mini calendar */
.sb-cal{padding:4px 8px 8px}
.cal-hdr{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--t2);font-size:14px;padding:0 5px;border-radius:50%;line-height:1.6;width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:all .2s}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-dow{font-size:8px;color:var(--t3);text-align:center;padding:2px 0;font-weight:700;letter-spacing:.3px}

/* note edit/preview toggle */
.nsplit-toggle{display:flex;gap:4px;padding:5px 8px 5px 37px;border-top:1px solid var(--b0);background:var(--bg1)}

.md-slash-item:hover,.md-slash-item.on{background:var(--bg3);color:var(--t0);border-color:var(--acb)}

.smodel-sel option{background:var(--bg3);color:var(--t0)}

<body>
<div id="root"></div>
<script>
(function(){
const {createElement:h,useState,useEffect,useRef,useMemo,useCallback,Fragment}=React;
const gid=()=>Math.random().toString(36).slice(2,8);
const DEF_LEFT_W=200,DEF_RIGHT_W=340,MIN_LEFT_W=130,MAX_LEFT_W=540,MIN_RIGHT_W=200,MAX_RIGHT_W=700,MIN_CENTER_W=260,RESIZER_W=24;
function fmtTs(ts){return new Date(ts).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}
function fmtAgo(ts){if(ts==null)return '-';const d=Date.now()-ts,m=Math.floor(d/60000),hh=Math.floor(d/3600000);if(m<1)return 'now';if(m<60)return m+'m';if(hh<24)return hh+'h';return Math.floor(hh/24)+'d'}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function formatPlainInline(s){return escH(s).replace(/\\\$/g,'$').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/~~([^~]+)~~/g,'<s>$1</s>')}
function renderMathExpression(expr,displayMode){
  var source=(expr||'').trim();
  if(!source)return '';
  if(window.katex&&typeof window.katex.renderToString==='function'){
    try{return window.katex.renderToString(source,{throwOnError:false,displayMode:!!displayMode});}
    catch(e){}
  }
  return '<span class="'+(displayMode?'math-block':'math-inline')+'">'+escH(source)+'</span>';
}
function renderInlineMd(s){
  var out=[],buf='',i=0;
  function flush(){if(buf){out.push(formatPlainInline(buf));buf='';}}
  while(i<s.length){
    var ch=s[i];
    if(ch==='`'){
      var codeEnd=s.indexOf('`',i+1);
      if(codeEnd!==-1){
        flush();
        out.push('<code>'+escH(s.slice(i+1,codeEnd))+'</code>');
        i=codeEnd+1;
        continue;
      }
    }
    if(ch==='$'&&s[i-1]!=='\\'&&s[i+1]!=='$'){
      var mathEnd=i+1;
      while(mathEnd<s.length){
        if(s[mathEnd]==='$'&&s[mathEnd-1]!=='\\')break;
        mathEnd++;
      }
      if(mathEnd<s.length){
        flush();
        out.push(renderMathExpression(s.slice(i+1,mathEnd),false));
        i=mathEnd+1;
        continue;
      }
    }
    buf+=ch;
    i++;
  }
  flush();
  return out.join('');
}
function renderMd(text){
  if(!text)return '';
  var lines=text.split('\n'),out=[],inCode=false,codeLines=[],inMath=false,mathLines=[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i],trimmed=line.trim();
    if(line.startsWith('```')){
      if(!inCode){inCode=true;codeLines=[];}
      else{out.push('<div class="md-code"><code>'+(codeLines.map(escH).join('\n'))+'</code></div>');inCode=false;codeLines=[];}
      continue;
    }
    if(inCode){codeLines.push(line);continue;}
    if(inMath){
      var closeIdx=line.lastIndexOf('$$');
      if(closeIdx!==-1){
        mathLines.push(line.slice(0,closeIdx));
        out.push('<div class="md-math-block">'+renderMathExpression(mathLines.join('\n'),true)+'</div>');
        inMath=false;
        mathLines=[];
      }else mathLines.push(line);
      continue;
    }
    if(trimmed.startsWith('$$')){
      if(trimmed.endsWith('$$')&&trimmed.length>4){
        out.push('<div class="md-math-block">'+renderMathExpression(trimmed.slice(2,-2),true)+'</div>');
      }else{
        inMath=true;
        var startIdx=line.indexOf('$$');
        var afterStart=line.slice(startIdx+2);
        if(afterStart)mathLines.push(afterStart);
      }
      continue;
    }
    if(/^#{1,3} /.test(line)){var lv=line.match(/^#+/)[0].length;out.push('<h'+Math.min(lv+2,5)+'>'+renderInlineMd(line.replace(/^#+\s/,''))+'</h'+Math.min(lv+2,5)+'>');}
    else if(line.startsWith('> '))out.push('<blockquote>'+renderInlineMd(line.slice(2))+'</blockquote>');
    else{
      var tkm=line.match(/^- \[([ x])\] (.+)/);
      if(tkm){var ck=tkm[1]==='x';out.push('<div class="tki '+(ck?'ck':'')+'"><span class="tkc">'+(ck?'&#10003;':'')+'</span><span>'+renderInlineMd(tkm[2])+'</span></div>');}
      else if(/^[-*] /.test(line))out.push('<li>'+renderInlineMd(line.slice(2))+'</li>');
      else if(/^\d+\. /.test(line))out.push('<li>'+renderInlineMd(line.replace(/^\d+\.\s+/,''))+'</li>');
      else if(line.trim()==='')out.push('<br/>');
      else out.push('<p>'+renderInlineMd(line)+'</p>');
    }
  }
  if(inCode)out.push('<div class="md-code"><code>'+codeLines.map(escH).join('\n')+'</code></div>');
  if(inMath)out.push('<div class="md-math-block">'+renderMathExpression(mathLines.join('\n'),true)+'</div>');
  return out.join('');
}
function mergeDefined(base,patch){
  var next={...(base||{})};
  if(!patch)return next;
  Object.keys(patch).forEach(function(key){
    if(patch[key]!==undefined)next[key]=patch[key];
  });
  return next;
}
function mergeMessages(existing,incoming){
  var byId={},ordered=[];
  (existing||[]).forEach(function(msg){
    byId[msg.id]=mergeDefined(byId[msg.id],msg);
    if(!ordered.includes(msg.id))ordered.push(msg.id);
  });
  (incoming||[]).forEach(function(msg){
    byId[msg.id]=mergeDefined(byId[msg.id],msg);
    if(!ordered.includes(msg.id))ordered.push(msg.id);
  });
  return ordered.map(function(id){return byId[id];}).sort(function(a,b){return (a.ts||0)-(b.ts||0);});
}
function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
function readStoredNumber(key,fallback){try{var v=parseInt(localStorage.getItem(key)||'',10);return Number.isFinite(v)?v:fallback;}catch(e){return fallback;}}
function readStoredValue(key,fallback){try{var v=localStorage.getItem(key);return v||fallback;}catch(e){return fallback;}}
function storeValue(key,value){try{localStorage.setItem(key,String(value));}catch(e){}}
function normalizePaneWidths(leftWidth,rightWidth,totalWidth){
  var safeTotal=totalWidth||window.innerWidth||1440;
  var leftMax=Math.max(MIN_LEFT_W,Math.min(MAX_LEFT_W,safeTotal-MIN_CENTER_W-MIN_RIGHT_W-RESIZER_W));
  var left=clamp(leftWidth,MIN_LEFT_W,leftMax);
  var rightMax=Math.max(MIN_RIGHT_W,Math.min(MAX_RIGHT_W,safeTotal-MIN_CENTER_W-left-RESIZER_W));
  var right=clamp(rightWidth,MIN_RIGHT_W,rightMax);
  leftMax=Math.max(MIN_LEFT_W,Math.min(MAX_LEFT_W,safeTotal-MIN_CENTER_W-right-RESIZER_W));
  left=clamp(left,MIN_LEFT_W,leftMax);
  return {left:left,right:right};
}
function focusTextareaSelection(el,start,end){
  requestAnimationFrame(function(){
    if(!el)return;
    el.focus();
    el.setSelectionRange(start,end);
  });
}
function wrapSelectedText(value,start,end,before,after,placeholder){
  var hasSel=start!==end;
  var inner=hasSel?value.slice(start,end):(placeholder||'text');
  var next=value.slice(0,start)+before+inner+after+value.slice(end);
  var innerStart=start+before.length;
  var innerEnd=innerStart+inner.length;
  return {
    value:next,
    selectionStart:hasSel?innerStart:innerStart,
    selectionEnd:hasSel?innerEnd:innerEnd
  };
}
function getCurrentLineBounds(value,cursor){
  var safeCursor=Math.max(0,Math.min(cursor,value.length));
  var lineStart=value.lastIndexOf('\n',Math.max(0,safeCursor-1))+1;
  var lineEnd=value.indexOf('\n',safeCursor);
  if(lineEnd===-1)lineEnd=value.length;
  return {lineStart:lineStart,lineEnd:lineEnd,line:value.slice(lineStart,lineEnd)};
}
function replaceCurrentLine(value,cursor,replacement,selectStartOffset,selectEndOffset){
  var bounds=getCurrentLineBounds(value,cursor);
  var next=value.slice(0,bounds.lineStart)+replacement+value.slice(bounds.lineEnd);
  return {
    value:next,
    selectionStart:bounds.lineStart+selectStartOffset,
    selectionEnd:bounds.lineStart+selectEndOffset
  };
}
var MD_SLASH_COMMANDS=[
  {id:'h1',label:'Heading 1',hint:'#',apply:function(value,cursor){return replaceCurrentLine(value,cursor,'# ',2,2);}},
  {id:'h2',label:'Heading 2',hint:'##',apply:function(value,cursor){return replaceCurrentLine(value,cursor,'## ',3,3);}},
  {id:'bullet',label:'Bullet List',hint:'- list',apply:function(value,cursor){return replaceCurrentLine(value,cursor,'- ',2,2);}},
  {id:'todo',label:'Todo List',hint:'[ ]',apply:function(value,cursor){return replaceCurrentLine(value,cursor,'- [ ] ',6,6);}},
  {id:'quote',label:'Quote',hint:'>',apply:function(value,cursor){return replaceCurrentLine(value,cursor,'> ',2,2);}},
  {id:'codeblock',label:'Code Block',hint:'```',apply:function(value,cursor){return replaceCurrentLine(value,cursor,'```\n\n```',4,4);}}
];
function getMarkdownSlashState(value,cursor){
  var bounds=getCurrentLineBounds(value,cursor);
  if(!bounds.line.startsWith('/'))return null;
  var query=bounds.line.slice(1).trim().toLowerCase();
  var options=MD_SLASH_COMMANDS.filter(function(cmd){
    return !query||cmd.label.toLowerCase().includes(query)||cmd.hint.toLowerCase().includes(query);
  });
  if(!options.length)return null;
  return {lineStart:bounds.lineStart,lineEnd:bounds.lineEnd,query:query,options:options};
}
document.body.setAttribute('data-theme',readStoredValue('orbit.theme','dark'));

// ── WORKSPACE.md template ──
function buildWorkspaceMd(todoTitle, todoNote, date, todoId){
  return [
    '# WORKSPACE.md — ' + todoTitle,
    '',
    '> Auto-generated by Orbit on ' + new Date(Date.now()).toISOString().slice(0,16).replace('T',' '),
    '> Do not delete this file — Orbit uses it to track workspace state.',
    '',
    '## Task',
    todoNote || '_No description provided._',
    '',
    '## Directory Structure',
    '```',
    'todo_' + todoId + '/',
    '├── WORKSPACE.md          ← this file (READ-ONLY for agent)',
    '├── .todo.json            ← todo metadata (READ-ONLY for agent)',
    '├── agents/',
    '│   └── <agent-id>/',
    '│       ├── session.json  ← agent session state',
    '│       ├── log.jsonl     ← full execution log',
    '│       └── attachments/  ← images/files sent by user',
    '└── <your work files>     ← create files here freely',
    '```',
    '',
    '## Permissions',
    '| Path | Access |',
    '|------|--------|',
    '| `WORKSPACE.md` | Read-only |',
    '| `.todo.json` | Read-only |',
    '| `agents/` | Read-only (your own session folder is writable) |',
    '| Everything else in this folder | Read + Write |',
    '',
    '## Files Created',
    '_No files created yet._',
  ].join('\n');
}

// ── API + WebSocket ──
var _searchParams=new URLSearchParams(window.location.search);
function trimSlash(url){return url?url.replace(/\/+$/,''):url;}
var API_ORIGIN=trimSlash(_searchParams.get('apiOrigin')||'http://localhost:3001');
var WS_ORIGIN=trimSlash(_searchParams.get('wsOrigin')||API_ORIGIN.replace(/^http/,'ws'));
var BASE=API_ORIGIN+'/api';
var WS_URL=WS_ORIGIN+'/ws';
var _ws=null;
var _wsHandlers={};
function wsOn(type,fn){if(!_wsHandlers[type])_wsHandlers[type]=[];_wsHandlers[type].push(fn);}
function wsOff(type,fn){if(_wsHandlers[type])_wsHandlers[type]=_wsHandlers[type].filter(h=>h!==fn);}
function wsConnect(){
  if(_ws&&(_ws.readyState===0||_ws.readyState===1))return;
  _ws=new WebSocket(WS_URL);
  _ws.onmessage=function(e){try{var m=JSON.parse(e.data);(_wsHandlers[m.type]||[]).forEach(h=>h(m.payload));}catch(err){}};
  _ws.onclose=function(){setTimeout(wsConnect,2000);};
  _ws.onerror=function(){};
}
wsConnect();

async function apiFetch(path,opts){
  var r=await fetch(BASE+path,{...opts,headers:{'Content-Type':'application/json',...(opts&&opts.headers)}});
  if(r.status===204)return null;
  var isJson=(r.headers.get('content-type')||'').includes('application/json');
  var body=isJson?await r.json():await r.text();
  if(!r.ok){
    var msg=(body&&body.error)||(body&&body.message)||(typeof body==='string'&&body)||('Request failed: '+r.status);
    throw new Error(msg);
  }
  return body;
}
var _debounceTimers={};
function debounce(key,fn,ms){clearTimeout(_debounceTimers[key]);_debounceTimers[key]=setTimeout(fn,ms);}

// ── helpers ──
function RunDots(){return h('span',{className:'rdots'},h('span',{className:'rd'}),h('span',{className:'rd'}),h('span',{className:'rd'}))}
function WaitingBubble(){return h('div',{className:'waiting-bubble'},
  h('div',{className:'waiting-avatar'},'🤖'),
  h('div',{className:'waiting-dots'},
    h('span',{className:'wdot'}),
    h('span',{className:'wdot'}),
    h('span',{className:'wdot'})
  )
)}
function MdView(p){return h('div',{className:'md',dangerouslySetInnerHTML:{__html:renderMd(p.text)}})}

function toolIcon(tool){
  if(!tool)return {cls:'tbi-tool',sym:'⚙️'};
  if(tool==='write_file'||tool==='create_file')return {cls:'tbi-write',sym:'✏️'};
  if(tool==='read_file')return {cls:'tbi-read',sym:'📖'};
  if(tool==='list_directory')return {cls:'tbi-list',sym:'📁'};
  if(tool==='shell'||tool==='bash')return {cls:'tbi-tool',sym:'💻'};
  return {cls:'tbi-tool',sym:'✨'};
}

// ── ToolBlock (merged tool+result) ──
function ToolBlock({msg}){
  const[open,setOpen]=useState(true);
  const ic=toolIcon(msg.tool);
  let arg={};
  try{arg=msg.input?JSON.parse(msg.input):{}}catch(e){arg={};}
  const shortArg=arg.path||arg.command||(typeof msg.input==='string'&&!msg.input.startsWith('{')?msg.input:'');
  // pretty-print JSON input if possible
  let prettyInput=msg.input||'';
  try{prettyInput=JSON.stringify(JSON.parse(msg.input),null,2);}catch(e){}
  return h('div',{className:'tool-block'},
    h('div',{className:'tool-block-hdr',onClick:()=>setOpen(o=>!o)},
      h('div',{className:'tool-block-icon '+ic.cls},ic.sym),
      h('span',{className:'tool-block-name'},msg.tool||'tool'),
      shortArg&&h('span',{className:'tool-block-arg'},shortArg),
      h('span',{className:'tool-block-status '+(msg.status==='ok'?'tbs-ok':msg.status==='running'?'tbs-run':'tbs-err')},
        msg.status==='ok'?'done':msg.status==='running'?'running':'error'),
      h('span',{className:'tool-chevron'},open?'▴':'▾')
    ),
    open&&h('div',{className:'tool-block-body'},
      prettyInput&&h(Fragment,null,
        h('div',{className:'tool-section'},
          h('div',{className:'tool-section-lbl'},'input'),
          h('pre',null,prettyInput)
        ),
        msg.output&&h('div',{className:'tool-divider'})
      ),
      msg.output&&h(Fragment,null,
        h('div',{className:'tool-section'},
          h('div',{className:'tool-section-lbl'},'output'),
          h('pre',{style:{color:msg.status==='ok'?'var(--t1)':'var(--re)'}},msg.output)
        )
      )
    )
  )
}

// ── ThinkBlock — collapsible ──
function ThinkBlock({msg}){
  const[open,setOpen]=useState(false);
  const preview=msg.content.replace(/\n/g,' ').slice(0,60)+(msg.content.length>60?'\u2026':'');
  return h('div',{className:'think-block'},
    h('div',{className:'think-hdr',onClick:()=>setOpen(o=>!o)},
      h('div',{className:'think-icon'},'💭'),
      h('span',{className:'think-label'},'thinking…'),
      !open&&h('span',{className:'think-preview'},preview),
      h('span',{className:'think-chevron'},open?'▴':'▾')
    ),
    open&&h('div',{className:'think-body'},
      h('span',{className:'think-txt'},msg.content)
    )
  )
}

// ── ChatMessage ──
function ChatMessage({msg}){
  if(msg.kind==='sys')return h('div',{className:'sys-block'},
    h('div',{className:'sys-line'}),
    h('div',{className:'sys-pill'},
      h('div',{className:'sys-icon'},'i'),
      h('span',{className:'sys-txt'},msg.content)
    ),
    h('div',{className:'sys-line'})
  );
  if(msg.kind==='think')return h(ThinkBlock,{msg});
  if(msg.kind==='tool')return h(ToolBlock,{msg});
  if(msg.kind==='out'){
    if(msg.isPlan)return h('div',{className:'plan-block'},
      h('div',{className:'out-hdr'},h('div',{className:'plan-icon'},'💭'),h('span',{className:'plan-label'},'thinking')),
      h('div',{className:'out-txt'},h(MdView,{text:msg.content||''}),msg.streaming&&h('span',{className:'cur'}))
    );
    return h('div',{className:'out-block'},
      h('div',{className:'out-hdr'},h('div',{className:'out-icon'},'✨'),h('span',{className:'out-label'},'response')),
      h('div',{className:'out-txt'},h(MdView,{text:msg.content||''}),msg.streaming&&h('span',{className:'cur'}))
    );
  }
  if(msg.kind==='user')return h('div',{className:'user-msg'},
    h('div',{className:'user-head'},
      h('span',{className:'user-label'},'you'),
      h('div',{className:'user-icon'},'👤')
    ),
    msg.attachments&&msg.attachments.map((att,i)=>
      att.type==='image'
        ?h('div',{key:i,className:'user-bubble'},h('div',{className:'user-bubble-img'},h('img',{src:att.dataUrl,alt:att.name})))
        :h('div',{key:i,className:'user-bubble'},
            h('div',{className:'user-bubble-file'},
              h('div',{className:'user-file-icon'},att.ext||'?'),
              h('span',{className:'user-file-name'},att.name),
              att.size&&h('span',{className:'user-file-size'},att.size)
            ))
    ),
    msg.content&&h('div',{className:'user-bubble'},h('span',{className:'user-bubble-text'},msg.content)),
    h('div',{className:'user-ts'},fmtTs(msg.ts))
  );
  return null;
}

// ── RunGroup (collapsible run execution) ──
function RunGroup({messages,label}){
  const[expanded,setExpanded]=useState(true);
  const toolCt=messages.filter(m=>m.kind==='tool').length;
  return h(Fragment,null,
    h('div',{className:'run-summary',onClick:()=>setExpanded(o=>!o)},
      h('div',{className:'run-sum-ico'},h('svg',{width:12,height:12,viewBox:'0 0 10 10'},h('circle',{cx:5,cy:5,r:4,fill:'none',stroke:'#3ecf8e',strokeWidth:1.5}),h('circle',{cx:5,cy:5,r:1.8,fill:'#3ecf8e'}))),
      h('span',{className:'run-sum-label'},label||h(Fragment,null,h('em',null,toolCt),' tool calls')),
      h('span',{className:'run-sum-chevron'},expanded?'▴':'▾')
    ),
    expanded&&h('div',{className:'run-items'},
      messages.map(function(msg){
        const ic=toolIcon(msg.tool);
        const shortArg=msg.tool==='shell'
          ?msg.input
          :(function(){
            try{
              const arg=msg.input?JSON.parse(msg.input):{};
              return arg.path||arg.command||'';
            }catch(e){
              return msg.input||'';
            }
          })();
        return h('div',{key:msg.id,className:'run-item'},
          h('div',{className:'run-item-hdr'},
            h('div',{className:'tool-block-icon '+ic.cls},ic.sym),
            h('span',{className:'run-item-name'},msg.tool||'tool'),
            shortArg&&h('span',{className:'run-item-arg'},shortArg),
            h('span',{className:'run-item-status '+(msg.status==='ok'?'tbs-ok':msg.status==='running'?'tbs-run':'tbs-err')},
              msg.status==='ok'?'done':msg.status==='running'?'running':'error')
          ),
          h('div',{className:'run-item-body'},
            msg.input&&h('div',{className:'run-item-sec'},
              h('label',null,'input'),
              h('div',{className:'run-item-code'},msg.input)
            ),
            (msg.output!==undefined&&msg.output!==null)&&h('div',{className:'run-item-sec'},
              h('label',null,'output'),
              h('div',{className:'run-item-code',style:{color:msg.status==='error'?'var(--re)':'var(--t1)'}},msg.output||'(empty)')
            )
          )
        );
      })
    )
  )
}

function renderChatThread(messages){
  const items=[];
  let run=[];
  function flushRun(){
    if(!run.length)return;
    items.push(h(RunGroup,{key:'run-'+run[0].id,messages:run}));
    run=[];
  }
  const arr=messages||[];
  arr.forEach(function(msg,idx){
    if(msg.kind==='tool'){
      run.push(msg);
      return;
    }
    flushRun();
    // mark out blocks that are immediately followed by a tool call as "plan" (thinking)
    let isPlan=false;
    if(msg.kind==='out'){
      for(let j=idx+1;j<arr.length;j++){
        if(arr[j].kind==='tool'){isPlan=true;break;}
        if(arr[j].kind==='out'||arr[j].kind==='user')break;
      }
    }
    items.push(h(ChatMessage,{key:msg.id,msg:isPlan?{...msg,isPlan:true}:msg}));
  });
  flushRun();
  return items;
}

// ── Composer ──
function Composer({agentStatus,onSend,onCancel}){
  const[val,setVal]=useState('');
  const[attachments,setAttachments]=useState([]);
  const[dragging,setDragging]=useState(false);
  const[isComposing,setIsComposing]=useState(false);
  const fileRef=useRef();
  const textRef=useRef();
  const canSend=agentStatus==='idle'||agentStatus==='running'||agentStatus==='finished'||agentStatus==='paused';
  const disabled=!canSend;

  function processFiles(files){
    Array.from(files).forEach(file=>{
      const ext=file.name.split('.').pop().toLowerCase();
      const isImg=['png','jpg','jpeg','gif','webp','svg'].includes(ext);
      const reader=new FileReader();
      reader.onload=e=>{
        setAttachments(prev=>[...prev,{
          id:gid(),name:file.name,type:isImg?'image':'file',
          file:file,
          dataUrl:e.target.result,
          ext:ext.toUpperCase(),
          size:file.size>1024*1024?(file.size/1024/1024).toFixed(1)+'MB':(file.size/1024).toFixed(0)+'KB'
        }]);
      };
      reader.readAsDataURL(file);
    });
  }

  function send(){
    if((!val.trim()&&!attachments.length)||disabled)return;
    onSend({text:val.trim(),attachments:[...attachments]});
    setVal('');setAttachments([]);
  }

  function onPaste(e){
    const items=e.clipboardData&&e.clipboardData.items;
    if(!items)return;
    const files=[];
    for(let i=0;i<items.length;i++){if(items[i].kind==='file')files.push(items[i].getAsFile());}
    if(files.length){e.preventDefault();processFiles(files);}
  }

  return h('div',{
    className:'composer'+(dragging?' drag-over':''),
    onDragOver:e=>{e.preventDefault();setDragging(true)},
    onDragLeave:()=>setDragging(false),
    onDrop:e=>{e.preventDefault();setDragging(false);processFiles(e.dataTransfer.files);}
  },
    attachments.length>0&&h('div',{className:'composer-attachments'},
      attachments.map(att=>h('div',{key:att.id,style:{position:'relative'}},
        att.type==='image'
          ?h('div',{className:'att-preview'},h('img',{src:att.dataUrl,alt:att.name}))
          :h('div',{className:'att-preview-file'},h('span',null,att.ext),h('span',null,att.name)),
        h('button',{className:'att-remove',onClick:()=>setAttachments(prev=>prev.filter(a=>a.id!==att.id))},'×')
      ))
    ),
    h('div',{className:'composer-row'},
      h('input',{type:'file',ref:fileRef,style:{display:'none'},multiple:true,onChange:e=>processFiles(e.target.files)}),
      h('button',{className:'attach-btn',disabled,onClick:()=>fileRef.current&&fileRef.current.click(),title:'Attach file or image'},
        h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},
          h('path',{d:'M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48'})
        )
      ),
      h('textarea',{
        ref:textRef,className:'composer-inp',disabled,
        placeholder:disabled?'Agent unavailable\u2026':'Message agent\u2026 (paste images, drag & drop files)',
        value:val,rows:1,
        onChange:e=>setVal(e.target.value),
        onCompositionStart:()=>setIsComposing(true),
        onCompositionEnd:()=>setIsComposing(false),
        onPaste,
        onKeyDown:e=>{
          if(e.key==='Enter'&&!e.shiftKey){
            if(e.nativeEvent&&e.nativeEvent.isComposing||isComposing||e.keyCode===229)return;
            e.preventDefault();
            send();
          }
        }
      }),
      agentStatus==='running'
        ?h('button',{className:'cancel-btn',onClick:onCancel,title:'Cancel and revert last message'},
            h('svg',{width:12,height:12,viewBox:'0 0 24 24',fill:'currentColor'},
              h('rect',{x:4,y:4,width:16,height:16,rx:2.5})
            )
          )
        :h('button',{className:'send-btn',disabled:disabled||(!val.trim()&&!attachments.length),onClick:send},'Send')
    ),
    !disabled&&h('div',{className:'drop-hint'},
      h('svg',{width:10,height:10,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},h('path',{d:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12'})),
      'drag & drop or paste images/files'
    )
  )
}

        h('div',{className:'fsp'}),

// ── TodoCard ──
function TodoCard({todo,todos,agents,isSel,isExp,isDragOver,onSel,onToggle,onToggleExp,onToggleSub,onAddSub,onDel,onUpdTitle,onUpdNote,onUpdSubTitle,onDelSub,onDragStart,onDragOver,onDrop,onDragEnd}){
  const[editTitle,setEditTitle]=useState(false);
  const[tval,setTval]=useState(todo.title);
  const[nval,setNval]=useState(todo.note);
  const[confDel,setConfDel]=useState(false);
  const[previewOnly,setPreviewOnly]=useState(false);
  const[isAddingSub,setIsAddingSub]=useState(false);
  const[subTitle,setSubTitle]=useState('');
  const[editingSubId,setEditingSubId]=useState(null);
  const[editingSubVal,setEditingSubVal]=useState('');
  const[isTitleComposing,setIsTitleComposing]=useState(false);
  const[noteSlashState,setNoteSlashState]=useState(null);
  const[noteSlashIndex,setNoteSlashIndex]=useState(0);
  const subInpRef=useRef(null);
  const noteRef=useRef(null);
  const noteHistoryRef=useRef([{value:todo.note,selectionStart:0,selectionEnd:0}]);
  const noteHistoryIndexRef=useRef(0);
  const applyingNoteHistoryRef=useRef(false);
  const children=(todo.children||[]).map(id=>todos[id]).filter(Boolean);
  const runAg=(todo.agentIds||[]).filter(id=>agents[id]&&agents[id].status==='running').length;
  const finAg=(todo.agentIds||[]).filter(id=>agents[id]&&agents[id].status==='finished').length;
  const doneCh=children.filter(c=>c.status==='done').length;
  const hasNote=todo.note&&todo.note.trim();
  const ckState=todo.status==='done'?'ck':children.length>0&&doneCh>0&&doneCh<children.length?'part':'';
  useEffect(()=>{setTval(todo.title);},[todo.title]);
  useEffect(()=>{setNval(todo.note);},[todo.note]);
  useEffect(()=>{
    setNoteSlashState(null);
    setNoteSlashIndex(0);
  },[todo.id,previewOnly]);
  useEffect(()=>{
    noteHistoryRef.current=[{value:todo.note,selectionStart:0,selectionEnd:0}];
    noteHistoryIndexRef.current=0;
    applyingNoteHistoryRef.current=false;
  },[todo.id]);
  useEffect(()=>{
    var current=noteHistoryRef.current[noteHistoryIndexRef.current];
    if(document.activeElement===noteRef.current)return;
    if(current&&current.value===todo.note)return;
    noteHistoryRef.current=[{value:todo.note,selectionStart:0,selectionEnd:0}];
    noteHistoryIndexRef.current=0;
  },[todo.note]);
  function commitTitle(){
    const v=tval.trim();
    if(!v){setTval(todo.title);setEditTitle(false);return;}
    if(v===todo.title){setEditTitle(false);return;}
    setEditTitle(false);
    onUpdTitle(todo.id,v);
  }
  function commitSub(){if(subTitle.trim())onAddSub(todo.id,subTitle.trim());setIsAddingSub(false);setSubTitle('');}
  function startAddSub(){setIsAddingSub(true);setSubTitle('');setTimeout(()=>subInpRef.current&&subInpRef.current.focus(),40);}
  function startEditSub(ch){setEditingSubId(ch.id);setEditingSubVal(ch.title);}
  function commitEditSub(subId){
    const next=(editingSubVal||'').trim();
    if(next&&onUpdSubTitle)onUpdSubTitle(subId,next);
    setEditingSubId(null);
    setEditingSubVal('');
  }
  function pushNoteHistory(value,selectionStart,selectionEnd){
    if(applyingNoteHistoryRef.current)return;
    var history=noteHistoryRef.current;
    var current=history[noteHistoryIndexRef.current];
    if(current&&current.value===value&&current.selectionStart===selectionStart&&current.selectionEnd===selectionEnd)return;
    var nextHistory=history.slice(0,noteHistoryIndexRef.current+1);
    nextHistory.push({value:value,selectionStart:selectionStart,selectionEnd:selectionEnd});
    if(nextHistory.length>150)nextHistory=nextHistory.slice(nextHistory.length-150);
    noteHistoryRef.current=nextHistory;
    noteHistoryIndexRef.current=nextHistory.length-1;
  }
  function syncNoteValue(next,selectionStart,selectionEnd){
    setNval(next);
    onUpdNote(todo.id,next);
    if(selectionStart!=null&&selectionEnd!=null)pushNoteHistory(next,selectionStart,selectionEnd);
  }
  function applyNoteHistory(nextIndex){
    var entry=noteHistoryRef.current[nextIndex];
    if(!entry)return;
    noteHistoryIndexRef.current=nextIndex;
    applyingNoteHistoryRef.current=true;
    setNval(entry.value);
    onUpdNote(todo.id,entry.value);
    setNoteSlashState(null);
    setNoteSlashIndex(0);
    focusTextareaSelection(noteRef.current,entry.selectionStart,entry.selectionEnd);
    requestAnimationFrame(function(){applyingNoteHistoryRef.current=false;});
  }
  function refreshNoteSlash(nextValue,nextCursor){
    const nextSlash=getMarkdownSlashState(nextValue,nextCursor);
    setNoteSlashState(nextSlash);
    setNoteSlashIndex(0);
  }
  function applyNoteEdit(result){
    if(!result||!noteRef.current)return;
    syncNoteValue(result.value,result.selectionStart,result.selectionEnd);
    setNoteSlashState(null);
    setNoteSlashIndex(0);
    focusTextareaSelection(noteRef.current,result.selectionStart,result.selectionEnd);
  }
  function applySlashCommand(cmd){
    if(!noteRef.current)return;
    const cursor=noteRef.current.selectionStart||0;
    applyNoteEdit(cmd.apply(nval,cursor));
  }
  function handleNoteKeyDown(e){
    const isMod=e.metaKey||e.ctrlKey;
    if(isMod&&e.key.toLowerCase()==='z'){
      e.preventDefault();
      if(e.shiftKey){
        if(noteHistoryIndexRef.current<noteHistoryRef.current.length-1)applyNoteHistory(noteHistoryIndexRef.current+1);
      }else{
        if(noteHistoryIndexRef.current>0)applyNoteHistory(noteHistoryIndexRef.current-1);
      }
      return;
    }
    if(isMod&&!e.shiftKey&&e.key.toLowerCase()==='y'){
      e.preventDefault();
      if(noteHistoryIndexRef.current<noteHistoryRef.current.length-1)applyNoteHistory(noteHistoryIndexRef.current+1);
      return;
    }
    if(isMod&&!e.shiftKey){
      var key=e.key.toLowerCase();
      if(key==='b'||key==='i'||key==='e'){
        e.preventDefault();
        if(key==='b')applyNoteEdit(wrapSelectedText(nval,e.target.selectionStart,e.target.selectionEnd,'**','**','bold'));
        if(key==='i')applyNoteEdit(wrapSelectedText(nval,e.target.selectionStart,e.target.selectionEnd,'*','*','italic'));
        if(key==='e')applyNoteEdit(wrapSelectedText(nval,e.target.selectionStart,e.target.selectionEnd,'`','`','code'));
        return;
      }
    }
    if(noteSlashState){
      if(e.key==='ArrowDown'){
        e.preventDefault();
        setNoteSlashIndex(function(idx){return (idx+1)%noteSlashState.options.length;});
        return;
      }
      if(e.key==='ArrowUp'){
        e.preventDefault();
        setNoteSlashIndex(function(idx){return (idx-1+noteSlashState.options.length)%noteSlashState.options.length;});
        return;
      }
      if(e.key==='Enter'){
        e.preventDefault();
        applySlashCommand(noteSlashState.options[noteSlashIndex]);
        return;
      }
      if(e.key==='Escape'){
        e.preventDefault();
        setNoteSlashState(null);
        setNoteSlashIndex(0);
      }
    }
  }
  return h('div',{
    className:'tc '+(isSel?'sel ':'')+( todo.status==='done'?'done-c':'')+(isDragOver?' drag-over':''),
    draggable:!todo.parentId,
    onDragStart:e=>{e.dataTransfer.effectAllowed='move';onDragStart&&onDragStart(todo.id);},
    onDragOver:e=>{e.preventDefault();onDragOver&&onDragOver(todo.id);},
    onDrop:e=>{e.preventDefault();onDrop&&onDrop(todo.id);},
    onDragEnd:()=>onDragEnd&&onDragEnd()
  },
    h('div',{className:'tc-row',onClick:()=>{onSel(todo.id);onToggleExp(todo.id);}},
      h('div',{className:'chk '+ckState,onClick:e=>{e.stopPropagation();onToggle(todo.id);}}),
      h('div',{className:'tbody'},
        editTitle
          ?h('input',{
            className:'iedit',
            value:tval,
            autoFocus:true,
            onChange:e=>setTval(e.target.value),
            onBlur:commitTitle,
            onClick:e=>e.stopPropagation(),
            onCompositionStart:()=>setIsTitleComposing(true),
            onCompositionEnd:()=>setIsTitleComposing(false),
            onKeyDown:e=>{
              if(e.key==='Enter'&&(e.nativeEvent&&e.nativeEvent.isComposing||isTitleComposing||e.keyCode===229))return;
              if(e.key==='Enter')commitTitle();
              if(e.key==='Escape'){setEditTitle(false);setTval(todo.title);}
            }
          })
          :h('span',{className:'ttl '+(todo.status==='done'?'dn':''),onDoubleClick:e=>{e.stopPropagation();setEditTitle(true);}},todo.title),
        !editTitle&&!isExp&&hasNote&&h('div',{className:'tnp'},h(MdView,{text:todo.note})),
        h('div',{className:'chips'},
          runAg>0&&h('span',{className:'chip c-run'},h(RunDots),' '+runAg+' running 🏃'),
          finAg>0&&!runAg&&h('span',{className:'chip c-fin'},'✅ agent done'),
          children.length>0&&h('span',{className:'chip c-sub'},'📋 '+doneCh+'/'+children.length+' sub'),
          !(todo.agentIds&&todo.agentIds.length)&&todo.status!=='done'&&h('span',{className:'chip c-noa'},'💤 no agent')
        )
      ),
      h('div',{className:'tacts',onClick:e=>e.stopPropagation()},
        h('button',{className:'ibtn',onClick:()=>onToggleExp(todo.id)},isExp?'\u2303':'\u2304'),
        h('button',{className:'ibtn del',onClick:()=>setConfDel(true)},'✕')
      )
    ),
    isExp&&h(Fragment,null,
      h('div',{className:'nsplit-toggle'},
        h('span',{className:'ntab '+(previewOnly?'':'on'),onClick:()=>setPreviewOnly(false)},'edit'),
        h('span',{className:'ntab '+(previewOnly?'on':''),onClick:()=>setPreviewOnly(true)},'preview')
      ),
      !previewOnly&&h('div',{className:'md-shortcuts'},
        h('span',null,'Shortcuts: Ctrl/Cmd+B bold, Ctrl/Cmd+I italic, Ctrl/Cmd+E code'),
        h('span',null,'Type / for blocks')
      ),
      h('div',{className:'nsplit'},
        !previewOnly&&h('div',{className:'nsplit-edit',style:{flex:1}},
          h('div',{className:'nsplit-label'},'markdown'),
          h('textarea',{
            ref:noteRef,
            className:'med',
            value:nval,
            rows:6,
            placeholder:'Notes (markdown)\u2026',
            onChange:e=>{
              syncNoteValue(e.target.value,e.target.selectionStart||0,e.target.selectionEnd||0);
              refreshNoteSlash(e.target.value,e.target.selectionStart||0);
            },
            onClick:e=>refreshNoteSlash(e.target.value,e.target.selectionStart||0),
            onKeyUp:e=>refreshNoteSlash(e.target.value,e.target.selectionStart||0),
            onKeyDown:handleNoteKeyDown
          }),
          noteSlashState&&h('div',{className:'md-slash'},
            noteSlashState.options.map(function(cmd,idx){
              return h('button',{
                key:cmd.id,
                type:'button',
                className:'md-slash-item '+(idx===noteSlashIndex?'on':''),
                onMouseDown:function(ev){ev.preventDefault();applySlashCommand(cmd);}
              },
                h('span',null,cmd.label),
                h('span',{className:'md-slash-k'},cmd.hint)
              );
            })
          )
        ),
        previewOnly&&h('div',{className:'nsplit-prev',style:{flex:1}},
          h('div',{className:'nsplit-label'},'preview'),
          h(MdView,{text:nval})
        )
      ),
      h('div',{className:'subp'},
        h('div',{className:'subi'},
          children.map(ch=>h('div',{key:ch.id,className:'subr'},
            h('div',{className:'sch '+(ch.status==='done'?'ck':''),onClick:()=>onToggleSub(ch.id)}),
            editingSubId===ch.id
              ?h('input',{className:'sub-edit',value:editingSubVal,autoFocus:true,
                  onChange:e=>setEditingSubVal(e.target.value),
                  onBlur:()=>commitEditSub(ch.id),
                  onKeyDown:e=>{if(e.key==='Enter')commitEditSub(ch.id);if(e.key==='Escape'){setEditingSubId(null);setEditingSubVal('');}}})
              :h('span',{className:'stl '+(ch.status==='done'?'dn':''),onDoubleClick:()=>startEditSub(ch)},ch.title),
            (ch.agentIds||[]).some(id=>agents[id]&&agents[id].status==='running')&&h('span',{className:'spulse'}),
            h('div',{className:'sub-actions'},
              h('button',{className:'sub-btn',onClick:()=>startEditSub(ch),title:'Rename sub-todo'},'✎'),
              h('button',{className:'sub-btn del',onClick:()=>onDelSub&&onDelSub(ch.id),title:'Delete sub-todo'},'✕')
            )
          )),
          isAddingSub&&h('div',{className:'subr'},
            h('div',{className:'sch'}),
            h('input',{ref:subInpRef,
              style:{flex:1,background:'transparent',border:'none',outline:'none',fontFamily:'var(--sans)',fontSize:12,color:'var(--t0)'},
              placeholder:'Sub-todo title\u2026 (Enter to save, Esc to cancel)',
              value:subTitle,
              onChange:e=>setSubTitle(e.target.value),
              onBlur:commitSub,
              onKeyDown:e=>{if(e.key==='Enter')commitSub();if(e.key==='Escape'){setIsAddingSub(false);setSubTitle('');}}
            })
          ),
          !isAddingSub&&h('div',{className:'add-sub',onClick:startAddSub},h('span',{style:{fontSize:14,lineHeight:1}},'✨'),' add sub-todo')
        )
      )
    ),
    confDel&&h('div',{className:'del-conf'},
      h('p',null,'Delete ',h('strong',{style:{color:'var(--re)'}},'\"'+todo.title+'\"'),'? Permanently removes todo, sub-todos, agents, sessions and all workspace files.'),
      h('div',{style:{display:'flex',gap:7}},
        h('button',{className:'btn btn-g',style:{fontSize:11,padding:'3px 10px'},onClick:()=>setConfDel(false)},'Cancel'),
        h('button',{className:'btn btn-r',style:{fontSize:11,padding:'3px 10px'},onClick:()=>{setConfDel(false);onDel(todo.id);}},'Delete permanently')
      )
    )
  )
}
