// ── MiniCalendar ──
function MiniCalendar({dates,selDate,onSelectDate}){
  const today=new Date().toISOString().slice(0,10);
  const[vy,setVy]=useState(()=>parseInt((selDate||today).slice(0,4)));
  const[vm,setVm]=useState(()=>parseInt((selDate||today).slice(5,7))-1);
  useEffect(()=>{
    if(selDate){setVy(parseInt(selDate.slice(0,4)));setVm(parseInt(selDate.slice(5,7))-1);}
  },[selDate]);
  const todoDates=new Set(dates.map(d=>d.date));
  const firstDow=new Date(vy,vm,1).getDay();
  const dim=new Date(vy,vm+1,0).getDate();
  const mname=new Date(vy,vm,1).toLocaleDateString('en-US',{month:'short',year:'numeric'});
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  function prevM(){if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1);}
  function nextM(){if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1);}
  return h('div',{className:'sb-cal'},
    h('div',{className:'cal-hdr'},
      h('button',{className:'cal-nav',onClick:prevM},'‹'),
      h('span',{className:'cal-month'},mname),
      h('button',{className:'cal-nav',onClick:nextM},'›')
    ),
    h('div',{className:'cal-grid'},
      ['S','M','T','W','T','F','S'].map((d,i)=>h('div',{key:i,className:'cal-dow'},d)),
      cells.map((day,i)=>{
        if(!day)return h('div',{key:'_'+i,className:'cal-cell'});
        const ds=vy+'-'+String(vm+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
        const has=todoDates.has(ds),isTod=ds===today,isSel=ds===selDate;
        return h('div',{key:ds,
          className:'cal-cell'+(has?' has-todos':'')+(isTod?' is-today':'')+(isSel?' is-sel':''),
          onClick:(has||isTod)?()=>onSelectDate(ds):undefined
        },day,has&&!isSel&&h('div',{className:'cal-dot'}));
      })
    )
  );
}

// ── App ──
function App(){
  const[todos,setTodos]=useState({});
  const[agents,setAgents]=useState({});
  const[dates,setDates]=useState([]);
  const[selDate,setSelDate]=useState(new Date().toISOString().slice(0,10));
  const[selTodo,setSelTodo]=useState(null);
  const[selAg,setSelAg]=useState(null);
  const[expIds,setExpIds]=useState(new Set());
  const[newAg,setNewAg]=useState(false);
  const[addingTodo,setAddingTodo]=useState(false);
  const[newTitle,setNewTitle]=useState('');
  const[theme,setTheme]=useState(()=>readStoredValue('orbit.theme','dark'));
  const[leftW,setLeftW]=useState(()=>readStoredNumber('orbit.leftWidth',DEF_LEFT_W));
  const[rightW,setRightW]=useState(()=>readStoredNumber('orbit.rightWidth',DEF_RIGHT_W));
  const[dragPane,setDragPane]=useState(null);
  const[dragTodoId,setDragTodoId]=useState(null);
  const[dragOverTodoId,setDragOverTodoId]=useState(null);
  const[todoOrderMap,setTodoOrderMap]=useState({});
  const[agentModelMap,setAgentModelMap]=useState({});
  const ntr=useRef();
  const appRef=useRef(null);

  useEffect(()=>{
    document.body.setAttribute('data-theme',theme);
    storeValue('orbit.theme',theme);
  },[theme]);

  useEffect(()=>{
    storeValue('orbit.leftWidth',leftW);
  },[leftW]);

  useEffect(()=>{
    storeValue('orbit.rightWidth',rightW);
  },[rightW]);

  useEffect(()=>{
    function syncWidths(){
      var next=normalizePaneWidths(leftW,rightW,window.innerWidth);
      if(next.left!==leftW)setLeftW(next.left);
      if(next.right!==rightW)setRightW(next.right);
    }
    syncWidths();
    window.addEventListener('resize',syncWidths);
    return()=>window.removeEventListener('resize',syncWidths);
  },[leftW,rightW]);

  useEffect(()=>{
    if(!dragPane)return;
    document.body.classList.add('is-resizing');
    function onMove(e){
      var rect=appRef.current?appRef.current.getBoundingClientRect():{left:0,right:window.innerWidth,width:window.innerWidth};
      if(dragPane==='left'){
        var nextLeft=normalizePaneWidths(e.clientX-rect.left,rightW,rect.width).left;
        setLeftW(nextLeft);
        return;
      }
      var nextRight=normalizePaneWidths(leftW,rect.right-e.clientX,rect.width).right;
      setRightW(nextRight);
    }
    function stopDrag(){
      document.body.classList.remove('is-resizing');
      setDragPane(null);
    }
    window.addEventListener('pointermove',onMove);
    window.addEventListener('pointerup',stopDrag);
    window.addEventListener('pointercancel',stopDrag);
    return()=>{
      document.body.classList.remove('is-resizing');
      window.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',stopDrag);
      window.removeEventListener('pointercancel',stopDrag);
    };
  },[dragPane,leftW,rightW]);

  // Load dates on mount + model map
  useEffect(()=>{
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
    apiFetch('/config/models').then(m=>{if(m)setAgentModelMap(m);}).catch(()=>{});
  },[]);

  // Load todos when date changes
  useEffect(()=>{
    if(!selDate)return;
    apiFetch('/todos?date='+selDate).then(async rows=>{
      if(!rows)return;
      const map={};
      for(const t of rows){
        map[t.id]=t;
        for(const cid of(t.children||[])){
          const ch=await apiFetch('/todos/'+cid).catch(()=>null);
          if(ch)map[ch.id]=ch;
        }
        const ags=await apiFetch('/agents?todoId='+t.id).catch(()=>[]);
        for(const ag of(ags||[])){
          const full=await apiFetch('/agents/'+ag.id).catch(()=>null);
          if(full){
            setAgents(p=>{
              const prev=p[full.id]||{};
              return {...p,[full.id]:mergeDefined(prev,{...full,messages:mergeMessages(prev.messages||[],full.messages||[])})};
            });
          }
        }
      }
      setTodos(p=>({...p,...map}));
    }).catch(()=>{});
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
  },[selDate]);

  // WebSocket real-time events
  useEffect(()=>{
    function onAgentMessage({agentId,message}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        const msgs=[...(ag.messages||[])];
        const idx=msgs.findIndex(m=>m.id===message.id);
        if(idx>=0){msgs[idx]=mergeDefined(msgs[idx],message);}else{msgs.push(message);}
        return {...p,[agentId]:{...ag,messages:msgs}};
      });
    }
    function onAgentStream({agentId,messageId,delta}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        const msgs=[...(ag.messages||[])];
        const idx=msgs.findIndex(m=>m.id===messageId);
        if(idx>=0){msgs[idx]={...msgs[idx],content:(msgs[idx].content||'')+delta};}
        else{msgs.push({id:messageId,kind:'out',content:delta,streaming:true,ts:Date.now()});}
        return {...p,[agentId]:{...ag,messages:msgs}};
      });
    }
    function onAgentStreamEnd({agentId,messageId}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        const msgs=(ag.messages||[]).map(m=>m.id===messageId?{...m,streaming:false}:m);
        return {...p,[agentId]:{...ag,messages:msgs}};
      });
    }
    function onAgentStatus({agentId,status,ctxPct,toolCalls,tokensUsed,tokensTotal}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        const upd={status,ctxPct:ctxPct!=null?ctxPct:ag.ctxPct,toolCalls:toolCalls!=null?toolCalls:ag.toolCalls};
        if(tokensUsed!=null)upd.tokensUsed=tokensUsed;
        if(tokensTotal!=null)upd.tokensTotal=tokensTotal;
        return {...p,[agentId]:{...ag,...upd}};
      });
    }
    function onAgentCtx({agentId,ctxPct,tokensUsed,tokensTotal}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        const upd={};
        if(ctxPct!=null)upd.ctxPct=ctxPct;
        if(tokensUsed!=null)upd.tokensUsed=tokensUsed;
        if(tokensTotal!=null)upd.tokensTotal=tokensTotal;
        return {...p,[agentId]:{...ag,...upd}};
      });
    }
    function onAgentCancelled({agentId,revertToTs}){
      setAgents(p=>{
        const ag=p[agentId];if(!ag)return p;
        const msgs=(ag.messages||[]).filter(m=>m.ts<revertToTs);
        return {...p,[agentId]:{...ag,messages:msgs,status:'idle'}};
      });
    }
    wsOn('agent:message',onAgentMessage);
    wsOn('agent:message:stream',onAgentStream);
    wsOn('agent:message:stream:end',onAgentStreamEnd);
    wsOn('agent:status',onAgentStatus);
    wsOn('agent:ctx',onAgentCtx);
    wsOn('agent:cancelled',onAgentCancelled);
    return()=>{
      wsOff('agent:message',onAgentMessage);
      wsOff('agent:message:stream',onAgentStream);
      wsOff('agent:message:stream:end',onAgentStreamEnd);
      wsOff('agent:status',onAgentStatus);
      wsOff('agent:ctx',onAgentCtx);
      wsOff('agent:cancelled',onAgentCancelled);
    };
  },[]);

  const rootTodos=useMemo(()=>{
    const base=Object.values(todos).filter(t=>t.date===selDate&&!t.parentId);
    const order=todoOrderMap[selDate];
    if(!order||!order.length)return base.sort((a,b)=>a.createdAt-b.createdAt);
    const bmap={};base.forEach(t=>{bmap[t.id]=t;});
    const ordered=[];
    for(const id of order){if(bmap[id])ordered.push(bmap[id]);}
    for(const t of base){if(!order.includes(t.id))ordered.push(t);}
    return ordered;
  },[todos,selDate,todoOrderMap]);
  const todo=todos[selTodo];
  const runCt=Object.values(agents).filter(a=>a.status==='running').length;

  function togExp(id){setExpIds(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function collapseAllExpanded(){
    setExpIds(p=>p.size?new Set():p);
  }
  function handleTodoBlankClick(e){
    if(e.target!==e.currentTarget)return;
    collapseAllExpanded();
  }
  function selTodoFn(id){setSelTodo(id);const t=todos[id];if(t&&t.agentIds&&t.agentIds.length)setSelAg(t.agentIds[0]);else setSelAg(null);}

  async function togTodo(id){
    const t=todos[id];if(!t)return;
    const ns=t.status==='done'?'pending':'done';
    setTodos(p=>({...p,[id]:{...p[id],status:ns,completedAt:ns==='done'?Date.now():undefined}}));
    apiFetch('/todos/'+id,{method:'PATCH',body:JSON.stringify({status:ns})}).catch(()=>{});
  }
  async function addSub(pid,title){
    if(!title||!title.trim())return;
    const parent=todos[pid];if(!parent)return;
    const created=await apiFetch('/todos',{method:'POST',body:JSON.stringify({date:parent.date,title:title.trim(),note:'',parentId:pid})});
    if(created){
      setTodos(p=>({...p,[created.id]:created,[pid]:{...p[pid],children:[...(p[pid].children||[]),created.id]}}));
      setExpIds(p=>new Set([...p,pid]));
    }
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
  }
  async function delTodo(id){
    const t=todos[id];
    await apiFetch('/todos/'+id,{method:'DELETE'});
    setTodos(p=>{const n={...p};if(t&&t.parentId&&n[t.parentId])n[t.parentId]={...n[t.parentId],children:(n[t.parentId].children||[]).filter(c=>c!==id)};([id,...(t&&t.children||[])]).forEach(tid=>delete n[tid]);return n;});
    setAgents(p=>{const n={...p};(t&&t.agentIds||[]).forEach(aid=>delete n[aid]);return n;});
    if(selTodo===id){setSelTodo(null);setSelAg(null);}
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
  }
  async function delAgent(aid){
    await apiFetch('/agents/'+aid,{method:'DELETE'});
    const ag=agents[aid];
    setAgents(p=>{const n={...p};delete n[aid];return n;});
    if(ag)setTodos(p=>{const t=p[ag.todoId];if(!t)return p;return {...p,[t.id]:{...t,agentIds:(t.agentIds||[]).filter(a=>a!==aid)}};});
    if(selAg===aid)setSelAg(null);
  }
  function updSubTitle(id,title){
    setTodos(p=>{if(!p[id])return p;return {...p,[id]:{...p[id],title}};});
    apiFetch('/todos/'+id,{method:'PATCH',body:JSON.stringify({title})}).catch(()=>{});
  }
  function renameAgent(aid,name){
    setAgents(p=>{const ag=p[aid];if(!ag)return p;return {...p,[aid]:{...ag,name}};});
    apiFetch('/agents/'+aid,{method:'PATCH',body:JSON.stringify({name})}).catch(()=>{});
  }
  function changeAgentModel(aid,model){
    setAgents(p=>{const ag=p[aid];if(!ag)return p;return {...p,[aid]:{...ag,model}};});
    apiFetch('/agents/'+aid,{method:'PATCH',body:JSON.stringify({model})}).catch(()=>{});
  }
  function handleDragStart(id){setDragTodoId(id);}
  function handleDragOverTodo(id){setDragOverTodoId(id);}
  function handleDropTodo(id){
    if(!dragTodoId||dragTodoId===id){setDragTodoId(null);setDragOverTodoId(null);return;}
    const base=rootTodos.map(t=>t.id);
    const fi=base.indexOf(dragTodoId),ti=base.indexOf(id);
    if(fi<0||ti<0){setDragTodoId(null);setDragOverTodoId(null);return;}
    const next=[...base];next.splice(fi,1);next.splice(ti,0,dragTodoId);
    setTodoOrderMap(p=>({...p,[selDate]:next}));
    setDragTodoId(null);setDragOverTodoId(null);
    next.forEach((tid,idx)=>{debounce('order_'+tid,()=>apiFetch('/todos/'+tid,{method:'PATCH',body:JSON.stringify({sortOrder:idx})}),600);});
  }
  function handleDragEndTodo(){setDragTodoId(null);setDragOverTodoId(null);}
  async function createAgent({cli,model,reasoningEffort,workspace,writeWorkspaceMd,storeRecordsInWorkspace,prompt}){
    if(!selTodo)return;
    try{
      const created=await apiFetch('/agents',{method:'POST',body:JSON.stringify({todoId:selTodo,cli,model,reasoningEffort:reasoningEffort||null,workspace:workspace||'',writeWorkspaceMd:writeWorkspaceMd!==false,storeRecordsInWorkspace:storeRecordsInWorkspace!==false,prompt:prompt||''})});
      if(!created||!created.id)throw new Error('Agent creation returned an invalid response');
      setAgents(p=>{
        const prev=p[created.id]||{};
        return {...p,[created.id]:mergeDefined(prev,{...created,messages:mergeMessages(prev.messages||[],created.messages||[])})};
      });
      setTodos(p=>({...p,[selTodo]:{...p[selTodo],agentIds:[...(p[selTodo].agentIds||[]),created.id]}}));
      setSelAg(created.id);setNewAg(false);
    }catch(err){
      alert('Failed to create agent: '+(err&&err.message?err.message:'unknown error'));
    }
  }
  async function addTodo(){
    if(!newTitle.trim()){setAddingTodo(false);return;}
    const created=await apiFetch('/todos',{method:'POST',body:JSON.stringify({date:selDate,title:newTitle.trim(),note:''})});
    if(created)setTodos(p=>({...p,[created.id]:created}));
    setNewTitle('');setAddingTodo(false);
    apiFetch('/workspace/dates').then(ds=>{if(ds)setDates(ds);}).catch(()=>{});
  }
  function onUpdTitle(id,v){
    setTodos(p=>{if(!p[id])return p;return {...p,[id]:{...p[id],title:v}};});
    debounce('title_'+id,async ()=>{
      try{
        await apiFetch('/todos/'+id,{method:'PATCH',body:JSON.stringify({title:v})});
      }catch(_err){}
    },500);
  }
  function onUpdNote(id,v){
    setTodos(p=>{if(!p[id])return p;return {...p,[id]:{...p[id],note:v}};});
    debounce('note_'+id,()=>apiFetch('/todos/'+id,{method:'PATCH',body:JSON.stringify({note:v})}),500);
  }

  async function handleSend(agentId,{text,attachments}){
    try{
      let attachmentIds=[];
      if(attachments&&attachments.length>0){
        const form=new FormData();
        form.append('agentId',agentId);
        for(const att of attachments){if(att.file)form.append('file',att.file,att.name);}
        const r=await fetch(BASE+'/attachments',{method:'POST',body:form});
        const j=await r.json();
        if(!r.ok)throw new Error((j&&j.error)||'attachment upload failed');
        attachmentIds=(j.attachments||[]).map(a=>a.id);
      }
      await apiFetch('/agents/'+agentId+'/send',{method:'POST',body:JSON.stringify({text,attachmentIds})});
    }catch(err){
      alert('Failed to send message: '+(err&&err.message?err.message:'unknown error'));
    }
  }
  async function handleInterrupt(agentId){
    try{
      await apiFetch('/agents/'+agentId+'/interrupt',{method:'POST',body:JSON.stringify({})});
    }catch(err){
      alert('Failed to interrupt agent: '+(err&&err.message?err.message:'unknown error'));
    }
  }
  async function handleCancel(agentId){
    try{
      await apiFetch('/agents/'+agentId+'/cancel',{method:'POST',body:JSON.stringify({})});
    }catch(err){
      alert('Failed to cancel: '+(err&&err.message?err.message:'unknown error'));
    }
  }

  function fmtDateHdr(d){
    try{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}catch(e){return d;}
  }
  const todayStr=new Date().toISOString().slice(0,10);

  return h('div',{className:'app',ref:appRef},
    h(Sidebar,{todos,agents,dates,selDate,setSelDate,onSelectTodo:selTodoFn,width:leftW}),
    h('div',{className:'pane-resizer '+(dragPane==='left'?'on':''),onPointerDown:e=>{e.preventDefault();setDragPane('left');},title:'Drag to resize left panel'}),
    h('div',{className:'mc'},
      h('div',{className:'mc-hdr'},
        h('div',{className:'mc-date'},fmtDateHdr(selDate)),
        h('div',{className:'mc-meta'},rootTodos.length,' todos',runCt>0&&h(Fragment,null,' \u00b7 ',h('em',null,runCt,' running'))),
        selDate!==todayStr&&h('button',{className:'hbtn',onClick:()=>setSelDate(todayStr),title:'Go to today'},'\u2190 Today'),
        h('button',{className:'hbtn ghost',onClick:()=>setTheme(p=>p==='dark'?'light':'dark')},theme==='dark'?'☀️ light':'🌙 dark'),
        !addingTodo&&h('button',{className:'hbtn pri',onClick:()=>{setAddingTodo(true);setTimeout(()=>ntr.current&&ntr.current.focus(),40);}},'\u2728 New todo')
      ),
      h('div',{className:'tl',onClick:handleTodoBlankClick},
        rootTodos.map(t=>h(TodoCard,{key:t.id,todo:t,todos,agents,isSel:selTodo===t.id,isExp:expIds.has(t.id),isDragOver:dragOverTodoId===t.id,onSel:selTodoFn,onToggle:togTodo,onToggleExp:togExp,onToggleSub:togTodo,onAddSub:addSub,onDel:delTodo,onUpdTitle,onUpdNote,onUpdSubTitle:updSubTitle,onDelSub:delTodo,onDragStart:handleDragStart,onDragOver:handleDragOverTodo,onDrop:handleDropTodo,onDragEnd:handleDragEndTodo})),
        addingTodo
          ?h('div',{className:'new-ti'},h('div',{className:'chk'}),h('input',{ref:ntr,className:'iedit',placeholder:'Todo title\u2026 (Enter to save, Esc to cancel)',value:newTitle,onChange:e=>setNewTitle(e.target.value),onBlur:addTodo,onKeyDown:e=>{if(e.key==='Enter')addTodo();if(e.key==='Escape'){setAddingTodo(false);setNewTitle('');}}})
)
          :h('div',{className:'add-t',onClick:()=>{setAddingTodo(true);setTimeout(()=>ntr.current&&ntr.current.focus(),40);}},h('span',{style:{fontSize:16,lineHeight:1}},'✨'),' Add todo')
      )
    ),
    h('div',{className:'pane-resizer '+(dragPane==='right'?'on':''),onPointerDown:e=>{e.preventDefault();setDragPane('right');},title:'Drag to resize right panel'}),
    h(AgentPanel,{todo:todo||null,agents,selAgId:selAg,onSelAg:setSelAg,onNew:()=>setNewAg(true),onDelAgent:delAgent,onRenameAgent:renameAgent,onChangeModel:changeAgentModel,modelMap:agentModelMap,onSend:handleSend,onInterrupt:handleInterrupt,onCancel:handleCancel,width:rightW}),
    newAg&&todo&&h(NewAgentModal,{todo,onClose:()=>setNewAg(false),onCreate:createAgent})
  )
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
})();
</script>
</body>
</html>
